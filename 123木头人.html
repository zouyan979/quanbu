<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>123 木头人 - 生存挑战</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Roboto+Mono:wght@500&display=swap');

        body {
            background-color: #111;
            font-family: 'Roboto Mono', monospace;
            overflow: hidden;
            touch-action: none; /* 防止手机双击缩放 */
            transition: background-color 0.5s;
        }

        /* 游戏状态颜色 */
        .state-green { background-color: #10b981; }
        .state-red { background-color: #ef4444; transition: background-color 0.1s; }
        .state-dead { background-color: #000; }

        /* 视频容器 */
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video, canvas {
            position: absolute;
            height: 100%;
            width: auto;
            max-width: 100%;
            object-fit: cover;
        }

        /* 镜像翻转 */
        .mirror { transform: scaleX(-1); }

        /* UI 覆盖层 */
        .overlay {
            position: absolute;
            z-index: 10;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        /* 动作条 */
        .motion-meter-container {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 300px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #555;
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s;
        }
        
        .motion-meter-container.calibrating {
            transform: translateY(-50%) scale(1.1);
            border-color: #0f0;
            background: rgba(0,0,0,0.8);
            box-shadow: 0 0 20px rgba(0,255,0,0.3);
        }

        .motion-bar {
            width: 100%;
            background: linear-gradient(to top, #0f0, #ff0, #f00);
            position: absolute;
            bottom: 0;
            transition: height 0.1s;
        }

        .threshold-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: white;
            z-index: 5;
            box-shadow: 0 0 5px black;
        }

        /* 玩偶/状态图标 */
        .doll-icon {
            font-size: 80px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }

        .animate-head-turn {
            animation: headTurn 0.5s ease-in-out;
        }

        @keyframes headTurn {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(180deg); }
            100% { transform: rotateY(0deg); }
        }

        /* 淘汰文字 */
        .eliminated-text {
            font-family: 'Black Ops One', cursive;
            color: #ff0000;
            text-shadow: 0 0 20px rgba(255,0,0,0.8);
            letter-spacing: 5px;
            transform: rotate(-10deg);
            animation: stamp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes stamp {
            from { opacity: 0; transform: scale(3) rotate(-10deg); }
            to { opacity: 1; transform: scale(1) rotate(-10deg); }
        }

        .controls {
            pointer-events: auto;
        }
        
        /* 提示框动画 */
        .fade-in { animation: fadeIn 0.3s forwards; }
        .fade-out { animation: fadeOut 0.3s forwards; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(10px); } }

        /* 隐藏滚动条 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body id="body" class="bg-gray-900 text-white select-none">

    <div id="gameContainer">
        <!-- 摄像头画面 -->
        <video id="video" autoplay playsinline class="mirror hidden"></video>
        <!-- Canvas 用于处理图像 -->
        <canvas id="motionCanvas" class="hidden"></canvas>
        <!-- 显示给用户看的 Canvas，叠加特效 -->
        <canvas id="displayCanvas" class="mirror"></canvas>

        <!-- 游戏界面 UI -->
        <div class="overlay">
            <!-- 顶部信息 -->
            <div class="flex justify-between items-start">
                <div class="bg-black/60 p-3 rounded-lg backdrop-blur-sm border border-white/20">
                    <div class="text-xs text-gray-400">生存时间</div>
                    <div id="scoreDisplay" class="text-2xl font-bold text-green-400 font-mono">00:00</div>
                </div>
                
                <div id="statusIcon" class="doll-icon text-green-500">
                    <i class="fa-solid fa-child-reaching"></i>
                </div>
            </div>
            
            <!-- 校准提示 (居中显示) -->
            <div id="calibrationTip" class="absolute top-1/4 left-0 right-0 text-center pointer-events-none opacity-0 transition-opacity duration-300 z-50">
                <div class="inline-block bg-black/80 text-green-400 px-6 py-3 rounded-full border border-green-500 backdrop-blur-md shadow-[0_0_20px_rgba(0,255,0,0.3)]">
                    <i class="fa-solid fa-crosshairs mr-2 animate-pulse"></i>
                    <span class="font-bold">校准模式</span>
                    <div class="text-xs text-white mt-1">绿色代表监测到的运动。保持静止，确保绿色尽量少。</div>
                </div>
            </div>

            <!-- 动作监测条 -->
            <div id="meterContainer" class="motion-meter-container">
                <div id="thresholdLine" class="threshold-line" style="bottom: 20%"></div> <!-- 阈值线 -->
                <div id="motionBar" class="motion-bar" style="height: 0%"></div>
            </div>

            <!-- 底部控制 -->
            <div class="w-full flex flex-col items-center justify-end pb-8 controls">
                
                <!-- 游戏结束/开始 面板 -->
                <div id="startPanel" class="text-center bg-black/80 p-6 rounded-2xl border border-gray-700 backdrop-blur-md shadow-2xl max-w-sm w-full transition-all duration-300">
                    <h1 class="text-3xl font-bold mb-2 text-red-500 font-['Black_Ops_One']">123 木头人</h1>
                    <p class="text-gray-300 text-sm mb-6">红灯动，立刻死。</p>
                    
                    <button id="startBtn" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-xl shadow-[0_0_15px_rgba(16,185,129,0.5)] transition active:scale-95 text-xl mb-4">
                        开始挑战
                    </button>

                    <!-- 灵敏度调节 -->
                    <div class="pt-4 border-t border-gray-700">
                        <div class="flex justify-between text-xs font-bold mb-2">
                            <span class="text-gray-400">易触发 (环境稳)</span>
                            <span class="text-gray-400">防抖动 (环境乱)</span>
                        </div>
                        <input type="range" id="sensitivityRange" min="10" max="100" value="40" 
                               class="w-full h-4 bg-gray-700 rounded-lg appearance-none cursor-pointer overflow-hidden relative z-50">
                        <p class="text-xs text-gray-500 mt-2">按住滑块可进入<span class="text-green-400">视觉校准模式</span></p>
                    </div>
                </div>

                <!-- 游戏结束显示 -->
                <div id="gameOverPanel" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-black/95 z-50 transition-opacity duration-300">
                    <h1 class="eliminated-text text-6xl md:text-8xl mb-8 border-4 border-red-600 p-4">淘汰</h1>
                    <p class="text-white text-xl mb-8">你在红灯时移动了！</p>
                    <p class="text-gray-400 mb-8">生存时间: <span id="finalScore" class="text-green-400">00:00</span></p>
                    
                    <div class="flex flex-col gap-3 w-full max-w-xs">
                        <button id="restartBtn" class="w-full bg-white text-black font-bold py-3 px-8 rounded-full hover:bg-gray-200 transition transform hover:scale-105 active:scale-95">
                            再次尝试
                        </button>
                        
                        <button id="homeBtn" class="w-full bg-transparent border border-gray-500 text-gray-300 font-bold py-3 px-8 rounded-full hover:bg-gray-800 hover:text-white transition active:scale-95">
                            <i class="fa-solid fa-house mr-2"></i>返回主菜单
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // 核心元素
        const video = document.getElementById('video');
        const motionCanvas = document.getElementById('motionCanvas');
        const displayCanvas = document.getElementById('displayCanvas');
        const motionCtx = motionCanvas.getContext('2d', { willReadFrequently: true });
        const displayCtx = displayCanvas.getContext('2d');
        
        // UI 元素
        const body = document.getElementById('body');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const homeBtn = document.getElementById('homeBtn');
        const startPanel = document.getElementById('startPanel');
        const gameOverPanel = document.getElementById('gameOverPanel');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const finalScore = document.getElementById('finalScore');
        const motionBar = document.getElementById('motionBar');
        const meterContainer = document.getElementById('meterContainer');
        const thresholdLine = document.getElementById('thresholdLine');
        const sensitivityRange = document.getElementById('sensitivityRange');
        const statusIcon = document.getElementById('statusIcon');
        const calibrationTip = document.getElementById('calibrationTip');

        // 游戏状态
        let isGameRunning = false;
        let isCalibrating = false;
        let gameState = 'WAITING'; 
        let startTime = 0;
        let scoreInterval;
        let loopId;
        
        // 动作检测变量
        let prevFrame = null;
        let width = 320; 
        let height = 240;
        let sensitivity = 40; 
        
        // 音频合成
        const synth = window.speechSynthesis;
        let audioCtx;

        // 初始化
        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        width: { ideal: 640 }, 
                        height: { ideal: 480 },
                        facingMode: "user" 
                    },
                    audio: false
                });
                video.srcObject = stream;
                
                await new Promise(resolve => video.onloadedmetadata = resolve);
                
                width = 320; 
                height = width * (video.videoHeight / video.videoWidth);
                motionCanvas.width = width;
                motionCanvas.height = height;
                displayCanvas.width = video.videoWidth;
                displayCanvas.height = video.videoHeight;
                
                update();
            } catch (err) {
                console.error(err);
                if(window.location.protocol !== 'file:') {
                    alert("需要摄像头权限。");
                }
            }
        }

        // 游戏主循环
        function update() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // 1. 获取低分辨率帧用于计算
                motionCtx.drawImage(video, 0, 0, width, height);
                const frame = motionCtx.getImageData(0, 0, width, height);
                const data = frame.data;
                
                // 2. 准备绘制到主屏幕
                if (isCalibrating) {
                    // --- 校准模式：黑白背景 + 绿色动态 ---
                    drawCalibrationView(data);
                } else {
                    // --- 正常模式：全彩视频 ---
                    displayCtx.drawImage(video, 0, 0, displayCanvas.width, displayCanvas.height);
                }
                
                // 3. 计算运动分值
                const score = calculateMotionScore(data);
                
                // 4. 更新 UI
                updateMotionBar(score);
                
                // 5. 游戏逻辑
                if (isGameRunning && gameState === 'RED') {
                    const threshold = (110 - sensitivity) * 500; 
                    if (score > threshold) {
                        gameOver();
                    }
                }
            }
            loopId = requestAnimationFrame(update);
        }

        // 绘制校准视图（高性能版）
        function drawCalibrationView(currentData) {
            // 我们直接在 motionCanvas 上操作像素，然后放大绘制到 displayCanvas
            // 这样比操作 1080p 的像素要快得多
            
            const output = motionCtx.createImageData(width, height);
            const outData = output.data;
            const len = currentData.length;
            const pFrame = prevFrame; // 上一帧数据

            if (pFrame) {
                for (let i = 0; i < len; i += 4) {
                    const r = currentData[i];
                    const g = currentData[i+1];
                    const b = currentData[i+2];
                    
                    // 转灰度
                    const gray = 0.3 * r + 0.59 * g + 0.11 * b;
                    
                    // 计算像素差异 (简单差值)
                    const diff = Math.abs(currentData[i+1] - pFrame[i+1]); // 绿通道差异
                    
                    if (diff > 20) { // 像素级噪点阈值
                        // 运动：高亮绿色
                        outData[i] = 0;
                        outData[i+1] = 255;
                        outData[i+2] = 0;
                        outData[i+3] = 255;
                    } else {
                        // 静止：灰色
                        outData[i] = gray * 0.5; // 变暗一点以便突出绿色
                        outData[i+1] = gray * 0.5;
                        outData[i+2] = gray * 0.5;
                        outData[i+3] = 255;
                    }
                }
            }
            
            motionCtx.putImageData(output, 0, 0);
            
            // 禁用平滑处理以获得酷炫的像素风，或者开启以获得模糊风
            displayCtx.imageSmoothingEnabled = false; 
            displayCtx.drawImage(motionCanvas, 0, 0, displayCanvas.width, displayCanvas.height);
        }

        function calculateMotionScore(data) {
            let score = 0;
            if (prevFrame) {
                for (let i = 0; i < data.length; i += 16) { 
                    const diff = Math.abs(data[i+1] - prevFrame[i+1]);
                    score += diff;
                }
            }
            prevFrame = new Uint8ClampedArray(data);
            return score;
        }

        function updateMotionBar(score) {
            const threshold = (110 - sensitivity) * 500;
            const percentage = Math.min(100, (score / (threshold * 1.5)) * 100); 
            
            motionBar.style.height = `${percentage}%`;
            
            // 阈值线逻辑：
            // 在校准模式下，我们让用户去凑这个线
            thresholdLine.style.bottom = `${(100 / 1.5)}%`; 
            
            if (percentage > (100 / 1.5)) {
                motionBar.style.background = '#ff0000'; 
                // 如果在校准模式且爆表，给点反馈
                if(isCalibrating) {
                    meterContainer.style.boxShadow = '0 0 20px rgba(255,0,0,0.8)';
                    meterContainer.style.borderColor = 'red';
                }
            } else {
                motionBar.style.background = 'linear-gradient(to top, #0f0, #ff0)';
                if(isCalibrating) {
                    meterContainer.style.boxShadow = '0 0 20px rgba(0,255,0,0.3)';
                    meterContainer.style.borderColor = '#0f0';
                }
            }
        }

        // --- 校准模式交互 ---
        function startCalibration() {
            isCalibrating = true;
            calibrationTip.classList.remove('opacity-0');
            meterContainer.classList.add('calibrating');
        }

        function endCalibration() {
            isCalibrating = false;
            calibrationTip.classList.add('opacity-0');
            meterContainer.classList.remove('calibrating');
            meterContainer.style.boxShadow = '';
            meterContainer.style.borderColor = '#555';
        }

        // 监听滑块交互
        sensitivityRange.addEventListener('mousedown', startCalibration);
        sensitivityRange.addEventListener('touchstart', startCalibration);
        
        sensitivityRange.addEventListener('mouseup', endCalibration);
        sensitivityRange.addEventListener('touchend', endCalibration);
        sensitivityRange.addEventListener('blur', endCalibration);

        sensitivityRange.addEventListener('input', (e) => {
            sensitivity = parseInt(e.target.value);
            // 每次移动都重置一下“校准”状态计时器，防止意外中断
            if(!isCalibrating) startCalibration();
        });

        // --- 游戏逻辑 ---

        function startGame() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            isGameRunning = true;
            gameState = 'GREEN';
            startTime = Date.now();
            
            startPanel.classList.add('hidden');
            gameOverPanel.classList.add('hidden');
            
            body.className = "state-green text-white";
            statusIcon.innerHTML = '<i class="fa-solid fa-person-running"></i>';
            statusIcon.className = "doll-icon text-white transform scale-110";
            
            scoreInterval = setInterval(() => {
                const delta = Date.now() - startTime;
                const secs = Math.floor(delta / 1000);
                const ms = Math.floor((delta % 1000) / 10);
                scoreDisplay.innerText = `${String(secs).padStart(2, '0')}:${String(ms).padStart(2, '0')}`;
            }, 50);

            speak("绿灯，开始行动");
            nextCycle();
        }

        function goHome() {
            isGameRunning = false;
            gameState = 'WAITING';
            clearInterval(scoreInterval);
            synth.cancel();

            gameOverPanel.classList.add('hidden');
            startPanel.classList.remove('hidden');
            
            body.className = "bg-gray-900 text-white";
            statusIcon.innerHTML = '<i class="fa-solid fa-child-reaching"></i>';
            statusIcon.className = "doll-icon text-green-500";
            scoreDisplay.innerText = "00:00";
        }

        function nextCycle() {
            if (!isGameRunning) return;

            setGreenLight();
            const greenTime = 2000 + Math.random() * 3000;

            setTimeout(() => {
                if (!isGameRunning) return;
                speak("红灯！不许动", () => {
                    setRedLight();
                    const redTime = 2000 + Math.random() * 2000;
                    setTimeout(() => {
                        if (isGameRunning) nextCycle();
                    }, redTime);
                });
            }, greenTime);
        }

        function setGreenLight() {
            gameState = 'GREEN';
            body.className = "state-green text-white";
            statusIcon.innerHTML = '<i class="fa-solid fa-person-running"></i>';
            statusIcon.className = "doll-icon text-white transform scale-110";
            speak("绿灯，开始行动");
        }

        function setRedLight() {
            if (!isGameRunning) return; 
            gameState = 'RED';
            body.className = "state-red text-white";
            statusIcon.innerHTML = '<i class="fa-solid fa-child"></i>'; 
            statusIcon.className = "doll-icon text-black animate-head-turn";
        }

        function gameOver() {
            isGameRunning = false;
            gameState = 'GAMEOVER';
            clearInterval(scoreInterval);
            playAlarmSound();
            speak("你动了，淘汰！");
            body.className = "state-dead text-white";
            gameOverPanel.classList.remove('hidden');
            finalScore.innerText = scoreDisplay.innerText;
        }

        function speak(text, callback) {
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN'; 
            utterance.pitch = 1.0; 
            utterance.rate = 1.2; 
            
            if (text.includes("红灯")) {
                utterance.pitch = 1.3; 
                utterance.rate = 1.6; 
            }
            utterance.onend = callback;
            synth.speak(utterance);
        }

        function playAlarmSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
        homeBtn.addEventListener('click', goHome);
        
        init();

    </script>
</body>
</html>

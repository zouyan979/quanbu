<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的创意工坊 | Creative Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['"JetBrains Mono"', 'monospace'],
                        sans: ['"Noto Sans SC"', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'cursor': 'cursor .75s step-end infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        cursor: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0b0e14;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b0e14; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* 玻璃拟态卡片 */
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(30, 41, 59, 0.6);
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
        }

        /* 打字机光标 */
        .typing-cursor::after {
            content: '|';
            animation: cursor .75s step-end infinite;
            color: #38bdf8;
        }

        /* 封面图渐变遮罩 */
        .card-gradient {
            background: linear-gradient(to bottom, transparent 0%, rgba(15, 23, 42, 0.9) 100%);
        }
        
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
        }
    </style>
</head>
<body class="font-sans antialiased selection:bg-blue-500 selection:text-white">

    <!-- 粒子背景 -->
    <canvas id="canvas-bg"></canvas>

    <!-- 核心容器 -->
    <div class="min-h-screen flex flex-col items-center relative z-10">

        <!-- Header / Hero Section -->
        <header class="w-full max-w-6xl px-6 pt-20 pb-12 flex flex-col items-center justify-center text-center min-h-[60vh]">
            
            <!-- 头像容器 -->
            <div class="relative group mb-8">
                <div class="absolute -inset-1 bg-gradient-to-r from-cyan-400 to-purple-600 rounded-full blur opacity-50 group-hover:opacity-100 transition duration-500 animate-float"></div>
                <img id="avatar" src="https://github.com/github.png" 
                     class="relative w-32 h-32 md:w-40 md:h-40 rounded-full border-4 border-slate-900 object-cover shadow-2xl z-10 transition transform group-hover:scale-105" 
                     alt="Profile">
            </div>

            <!-- 名字 -->
            <h1 id="displayName" class="text-4xl md:text-6xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400 mb-4 tracking-tight">
                Developer
            </h1>

            <!-- 打字机特效区域 -->
            <div class="h-8 md:h-10 mb-8 font-mono text-lg md:text-2xl text-blue-400">
                <span id="typewriter" class="typing-cursor"></span>
            </div>

            <!-- 向下滚动提示 -->
            <div class="absolute bottom-10 animate-bounce cursor-pointer opacity-50 hover:opacity-100 transition" onclick="scrollToProjects()">
                <i class="fa-solid fa-chevron-down text-2xl"></i>
            </div>
        </header>

        <!-- 项目列表区 -->
        <main id="projects-section" class="w-full max-w-7xl px-4 pb-20">
            <div class="flex items-center justify-between mb-8 px-2">
                <h2 class="text-2xl font-bold text-white flex items-center">
                    <i class="fa-solid fa-flask text-purple-500 mr-3"></i> 实验室项目
                </h2>
                <div id="project-count" class="text-xs font-mono text-slate-500 bg-slate-800 px-3 py-1 rounded-full border border-slate-700">
                    Loading...
                </div>
            </div>

            <!-- 项目网格 -->
            <div id="projectGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                <!-- 这里的卡片会由 JS 生成 -->
            </div>

            <!-- 错误提示 -->
            <div id="errorMsg" class="hidden text-center py-12 w-full">
                <div class="inline-block p-4 rounded-lg bg-red-900/20 border border-red-500/30 text-red-400 max-w-xl">
                    <div class="flex flex-col items-center">
                        <i class="fa-solid fa-triangle-exclamation text-3xl mb-3"></i>
                        <span id="errorText" class="font-bold">加载失败</span>
                        <p id="errorDetail" class="text-sm mt-2 text-red-300/70"></p>
                    </div>
                </div>
            </div>
            
            <!-- 加载中 -->
            <div id="loader" class="flex justify-center py-20">
                <div class="flex items-center space-x-2">
                    <div class="w-3 h-3 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 0s"></div>
                    <div class="w-3 h-3 bg-purple-500 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                    <div class="w-3 h-3 bg-cyan-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                </div>
            </div>
        </main>

        <footer class="w-full border-t border-slate-800 bg-slate-900/50 py-8 text-center text-slate-500 text-sm backdrop-blur-sm">
            <p>&copy; <span id="year"></span> Created with <i class="fa-solid fa-heart text-red-500 mx-1"></i> & GitHub API</p>
        </footer>

    </div>

    <!-- 核心逻辑 -->
    <script>
        // ==========================================
        // 👇 这里是唯一需要你修改的地方 👇
        // ==========================================
        const CONFIG = {
            // 你的 GitHub 用户名 (必须完全一致)
            username: "zouyan979", 
            
            // 你的仓库名称 (根据你的截图，我帮你改成了 quanbu)
            // 如果你的游戏其实在 starry-hollow 仓库，请把这里改成 "starry-hollow"
            repo: "quanbu",
            
            // 你的昵称 (显示在网页中间的大标题)
            name: "邹炎的git",
            
            // 打字机显示的文字 (会自动轮播)
            typingTexts: [
                "热爱前端交互技术",
                "正在探索 Web 摄像头的无限可能",
                "HTML5 / Canvas / AI / Creative Coding",
                "这里存放着我的奇思妙想..."
            ]
        };
        // ==========================================
        
        // 初始化页面
        document.getElementById('displayName').innerText = CONFIG.name;
        document.getElementById('avatar').src = `https://github.com/${CONFIG.username}.png`;
        document.getElementById('year').innerText = new Date().getFullYear();

        /* ------------------------------------------------
           1. 打字机特效逻辑
        ------------------------------------------------ */
        const typeWriterElement = document.getElementById('typewriter');
        let textIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        let typeSpeed = 100;

        function type() {
            const currentText = CONFIG.typingTexts[textIndex];
            
            if (isDeleting) {
                typeWriterElement.innerText = currentText.substring(0, charIndex - 1);
                charIndex--;
                typeSpeed = 50; // 删除速度快一点
            } else {
                typeWriterElement.innerText = currentText.substring(0, charIndex + 1);
                charIndex++;
                typeSpeed = 100; // 打字速度正常
            }

            if (!isDeleting && charIndex === currentText.length) {
                isDeleting = true;
                typeSpeed = 2000; // 打完一句话，停顿2秒
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                textIndex = (textIndex + 1) % CONFIG.typingTexts.length;
                typeSpeed = 500; // 删完一句话，停顿0.5秒
            }

            setTimeout(type, typeSpeed);
        }
        // 启动打字机
        document.addEventListener('DOMContentLoaded', type);


        /* ------------------------------------------------
           2. 智能项目获取与卡片生成
        ------------------------------------------------ */
        async function fetchProjects() {
            const grid = document.getElementById('projectGrid');
            const loader = document.getElementById('loader');
            const errorArea = document.getElementById('errorMsg');
            const countBadge = document.getElementById('project-count');
            const errorText = document.getElementById('errorText');
            const errorDetail = document.getElementById('errorDetail');

            try {
                // 加上时间戳防止缓存
                const response = await fetch(`https://api.github.com/repos/${CONFIG.username}/${CONFIG.repo}/contents/?t=${Date.now()}`);
                
                if (!response.ok) {
                    if (response.status === 403) {
                        throw new Error("访问频率受限 (403)");
                    } else if (response.status === 404) {
                        throw new Error("找不到仓库 (404)");
                    } else {
                        throw new Error(`连接错误 (${response.status})`);
                    }
                }
                
                const data = await response.json();

                // 筛选 HTML 文件
                const projects = data.filter(file => 
                    file.name.endsWith('.html') && 
                    file.name !== 'index.html' && 
                    file.name !== 'uploader.html' && 
                    !file.name.includes('404')
                );

                loader.classList.add('hidden');
                countBadge.innerText = `${projects.length} Projects`;

                if (projects.length === 0) {
                    grid.innerHTML = `<div class="col-span-full text-center text-slate-500 py-10 border border-dashed border-slate-700 rounded-xl">
                        <i class="fa-solid fa-box-open text-4xl mb-4"></i><br>
                        仓库 "${CONFIG.repo}" 里还没有 HTML 文件。<br>快去上传你的第一个作品吧！
                    </div>`;
                    return;
                }

                projects.forEach((file, index) => {
                    // 延迟动画，制造瀑布流效果
                    setTimeout(() => {
                        const card = createCard(file);
                        grid.innerHTML += card;
                    }, index * 100);
                });

            } catch (err) {
                loader.classList.add('hidden');
                errorArea.classList.remove('hidden');
                
                if (err.message.includes("403")) {
                    errorText.innerText = "刷新太快，触发 GitHub 限制";
                    errorDetail.innerText = "GitHub 限制每小时只能请求 60 次 API。您刚才刷新次数过多。\n请休息 30-60 分钟后再试，或者切换手机热点（换个IP）试试。";
                } else if (err.message.includes("404")) {
                    errorText.innerText = `找不到仓库 "${CONFIG.repo}"`;
                    errorDetail.innerText = `请确认 settings 里仓库名是否为 "${CONFIG.repo}"，且状态为 Public。`;
                } else {
                    errorText.innerText = "发生未知错误";
                    errorDetail.innerText = err.message;
                }
            }
        }

        // 根据文件名生成好看的样式
        function getProjectStyle(filename) {
            const name = filename.toLowerCase();
            
            // 默认样式
            let style = {
                gradient: "from-slate-700 to-slate-900",
                icon: "fa-code",
                tag: "Experiment",
                color: "text-slate-400"
            };

            // 规则匹配
            if (name.includes('magic') || name.includes('cloak') || name.includes('隐形')) {
                style = { gradient: "from-violet-600 to-indigo-600", icon: "fa-wand-magic-sparkles", tag: "Visual FX", color: "text-violet-400" };
            } else if (name.includes('game') || name.includes('123') || name.includes('red') || name.includes('play')) {
                style = { gradient: "from-rose-500 to-red-600", icon: "fa-gamepad", tag: "Game", color: "text-rose-400" };
            } else if (name.includes('cam') || name.includes('photo') || name.includes('mirror')) {
                style = { gradient: "from-cyan-500 to-blue-600", icon: "fa-camera", tag: "WebCam", color: "text-cyan-400" };
            } else if (name.includes('ai') || name.includes('gpt') || name.includes('smart')) {
                style = { gradient: "from-emerald-400 to-teal-600", icon: "fa-robot", tag: "AI Demo", color: "text-emerald-400" };
            }

            return style;
        }

        function createCard(file) {
            const cleanName = file.name.replace('.html', '').replace(/[-_]/g, ' ').toUpperCase();
            const url = `https://${CONFIG.username}.github.io/${CONFIG.repo}/${file.name}`;
            const style = getProjectStyle(file.name);

            return `
            <a href="${url}" class="glass-card block relative rounded-2xl overflow-hidden group h-64 flex flex-col justify-between animate-float" style="animation-duration: ${6 + Math.random() * 4}s; animation-delay: ${Math.random()}s;">
                <!-- 顶部视觉区域 -->
                <div class="h-32 bg-gradient-to-br ${style.gradient} relative p-6 flex flex-col justify-between transition-all duration-500 group-hover:h-full group-hover:scale-110">
                    <div class="flex justify-between items-start z-10">
                        <div class="bg-black/30 backdrop-blur-md p-3 rounded-lg text-white shadow-lg">
                            <i class="fa-solid ${style.icon} text-xl"></i>
                        </div>
                        <span class="text-[10px] font-bold tracking-wider uppercase bg-white/20 px-2 py-1 rounded text-white backdrop-blur-md border border-white/10">
                            ${style.tag}
                        </span>
                    </div>
                    <!-- 装饰图案 -->
                    <i class="fa-solid ${style.icon} absolute -bottom-6 -right-6 text-9xl opacity-10 rotate-12 group-hover:rotate-0 transition duration-700"></i>
                </div>

                <!-- 底部信息区域 -->
                <div class="p-6 relative bg-slate-900/40 flex-1 flex flex-col justify-end">
                    <!-- 渐变遮罩，防止文字看不清 -->
                    <div class="absolute inset-0 card-gradient opacity-0 group-hover:opacity-100 transition duration-300 pointer-events-none"></div>
                    
                    <div class="relative z-10">
                        <h3 class="text-xl font-bold text-white mb-1 group-hover:text-transparent group-hover:bg-clip-text group-hover:bg-gradient-to-r group-hover:from-white group-hover:to-slate-300 transition-all">
                            ${cleanName}
                        </h3>
                        <p class="text-xs text-slate-400 group-hover:text-white/80 transition-colors">
                            点击进入体验 <i class="fa-solid fa-arrow-right ml-1 opacity-0 group-hover:opacity-100 group-hover:translate-x-1 transition-all"></i>
                        </p>
                    </div>
                </div>
            </a>
            `;
        }

        function scrollToProjects() {
            document.getElementById('projects-section').scrollIntoView({ behavior: 'smooth' });
        }

        fetchProjects();

        /* ------------------------------------------------
           3. 粒子星空背景 (Canvas)
        ------------------------------------------------ */
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2;
                this.alpha = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }
            draw() {
                ctx.fillStyle = `rgba(148, 163, 184, ${this.alpha})`; // Slate-400
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const count = Math.min(window.innerWidth / 10, 100); // 根据屏幕宽度决定数量
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            
            // 连线逻辑
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                p.update();
                p.draw();

                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dx = p.x - p2.x;
                    const dy = p.y - p2.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);

                    if (dist < 100) {
                        ctx.strokeStyle = `rgba(56, 189, 248, ${0.1 - dist/1000})`; // Blue line
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>每日安全签到 - 本地化版</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f3f4f6;
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .spinner {
            border: 3px solid rgba(0, 0, 0, 0.1);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border-left-color: #000;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const STORAGE_KEY = 'daily_safety_checkin_cn_v1';
        const WARM_QUOTES = [
            "平安是福，点亮心灯。", "今日无事，便是好时节。", 
            "即使独行，也有星光。", "好好生活，慢慢相遇。",
            "世界很大，有人在等你。", "每一个日子都值得起舞。"
        ];

        // --- 坐标转换算法 (WGS84 -> GCJ02) ---
        // 浏览器的GPS是WGS84，高德地图是GCJ02，必须转换否则偏差巨大
        const wgs84ToGcj02 = (lat, lng) => {
            const x_pi = 3.14159265358979324 * 3000.0 / 180.0;
            const a = 6378245.0;
            const ee = 0.00669342162296594323;

            if (outOfChina(lat, lng)) return { lat, lng };

            let dLat = transformLat(lng - 105.0, lat - 35.0);
            let dLng = transformLng(lng - 105.0, lat - 35.0);
            const radLat = lat / 180.0 * Math.PI;
            let magic = Math.sin(radLat);
            magic = 1 - ee * magic * magic;
            const sqrtMagic = Math.sqrt(magic);
            dLat = (dLat * 180.0) / ((a * (1 - ee)) / (magic * sqrtMagic) * Math.PI);
            dLng = (dLng * 180.0) / (a / sqrtMagic * Math.cos(radLat) * Math.PI);
            return { lat: lat + dLat, lng: lng + dLng };
        };

        const transformLat = (x, y) => {
            let ret = -100.0 + 2.0 * x + 3.0 * y + 0.2 * y * y + 0.1 * x * y + 0.2 * Math.sqrt(Math.abs(x));
            ret += (20.0 * Math.sin(6.0 * x * Math.PI) + 20.0 * Math.sin(2.0 * x * Math.PI)) * 2.0 / 3.0;
            ret += (20.0 * Math.sin(y * Math.PI) + 40.0 * Math.sin(y / 3.0 * Math.PI)) * 2.0 / 3.0;
            ret += (160.0 * Math.sin(y / 12.0 * Math.PI) + 320 * Math.sin(y * Math.PI / 30.0)) * 2.0 / 3.0;
            return ret;
        };

        const transformLng = (x, y) => {
            let ret = 300.0 + x + 2.0 * y + 0.1 * x * x + 0.1 * x * y + 0.1 * Math.sqrt(Math.abs(x));
            ret += (20.0 * Math.sin(6.0 * x * Math.PI) + 20.0 * Math.sin(2.0 * x * Math.PI)) * 2.0 / 3.0;
            ret += (20.0 * Math.sin(x * Math.PI) + 40.0 * Math.sin(x / 3.0 * Math.PI)) * 2.0 / 3.0;
            ret += (150.0 * Math.sin(x / 12.0 * Math.PI) + 300.0 * Math.sin(x / 30.0 * Math.PI)) * 2.0 / 3.0;
            return ret;
        };

        const outOfChina = (lat, lng) => {
            if (lng < 72.004 || lng > 137.8347) return true;
            if (lat < 0.8293 || lat > 55.8271) return true;
            return false;
        };

        // --- UI 组件 ---

        const TabBar = ({ currentTab, onTabChange }) => (
            <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-6 py-3 flex justify-between items-center z-50 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                <button onClick={() => onTabChange('home')} className={`flex flex-col items-center gap-1 transition-colors ${currentTab === 'home' ? 'text-amber-500' : 'text-gray-400'}`}>
                    <i className="fas fa-shield-halved text-xl"></i><span className="text-[10px]">守护</span>
                </button>
                <div className="w-px h-8 bg-gray-100"></div>
                <button onClick={() => onTabChange('mine')} className={`flex flex-col items-center gap-1 transition-colors ${currentTab === 'mine' ? 'text-amber-500' : 'text-gray-400'}`}>
                    <i className="fas fa-sliders text-xl"></i><span className="text-[10px]">配置</span>
                </button>
            </div>
        );

        const App = () => {
            const [currentTab, setCurrentTab] = useState('home');
            const [mounted, setMounted] = useState(false);
            
            // 数据
            const [userName, setUserName] = useState('');
            const [lastCheckIn, setLastCheckIn] = useState(null);
            const [streak, setStreak] = useState(0);
            const [history, setHistory] = useState({}); 
            const [contacts, setContacts] = useState([]);
            const [deadlineTime, setDeadlineTime] = useState('');
            
            // 配置
            const [emailMode, setEmailMode] = useState('manual'); // 'manual' (mailto) or 'auto' (emailjs)
            const [emailConfig, setEmailConfig] = useState({ serviceId: '', templateId: '', publicKey: '' });

            // 状态
            const [userLocation, setUserLocation] = useState(null); // WGS84
            const [gcjLocation, setGcjLocation] = useState(null);   // GCJ02 (高德)
            const [locError, setLocError] = useState('');
            const [feedbackMsg, setFeedbackMsg] = useState('');
            const [statusLevel, setStatusLevel] = useState('safe');
            const [isAutoSending, setIsAutoSending] = useState(false);
            const [sendLogs, setSendLogs] = useState([]); 

            // 蓝牙
            const [heartRate, setHeartRate] = useState(null);
            const [isBtConnected, setIsBtConnected] = useState(false);

            // 表单
            const [newContactName, setNewContactName] = useState('');
            const [newContactEmail, setNewContactEmail] = useState('');
            const [tempEmailConfig, setTempEmailConfig] = useState({...emailConfig});

            // --- 初始化 ---
            useEffect(() => {
                const savedData = localStorage.getItem(STORAGE_KEY);
                if (savedData) {
                    try {
                        const parsed = JSON.parse(savedData);
                        setLastCheckIn(parsed.lastCheckIn);
                        setStreak(parsed.streak || 0);
                        setHistory(parsed.history || {});
                        setContacts(parsed.contacts || []);
                        setDeadlineTime(parsed.deadlineTime || '');
                        setUserName(parsed.userName || '');
                        setEmailMode(parsed.emailMode || 'manual');
                        if (parsed.emailConfig) {
                            setEmailConfig(parsed.emailConfig);
                            setTempEmailConfig(parsed.emailConfig);
                            if (parsed.emailConfig.publicKey && window.emailjs) {
                                emailjs.init(parsed.emailConfig.publicKey);
                            }
                        }
                    } catch(e) { console.error("Load error", e); }
                }
                setMounted(true);
            }, []);

            // --- 持久化 ---
            useEffect(() => {
                if (!mounted) return;
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ 
                    lastCheckIn, streak, history, contacts, deadlineTime, userName, emailConfig, emailMode
                }));
            }, [lastCheckIn, streak, history, contacts, deadlineTime, userName, emailConfig, emailMode, mounted]);

            // --- 监控 (每10秒) ---
            useEffect(() => {
                if (!mounted) return;
                const timer = setInterval(() => {
                    const now = new Date();
                    
                    if (lastCheckIn) {
                        const hours = (now.getTime() - lastCheckIn) / 3600000;
                        if (hours < 24) setStatusLevel('safe');
                        else if (hours >= 24 && hours < 48) setStatusLevel('warning');
                        else setStatusLevel('danger');
                    }
                    
                    if (deadlineTime && !isTodayChecked()) {
                        const [h, m] = deadlineTime.split(':').map(Number);
                        const deadline = new Date();
                        deadline.setHours(h, m, 0, 0);
                        
                        if (now > deadline && (now - deadline) < 300000) {
                            if (!isAutoSending && statusLevel !== 'triggered') {
                                setStatusLevel('triggered');
                                handleEmergencyTrigger("超时未签到自动触发");
                            }
                        }
                    }
                }, 10000);
                return () => clearInterval(timer);
            }, [lastCheckIn, deadlineTime, isAutoSending, statusLevel, mounted]);

            // --- 核心功能 ---

            const handleGetLocation = () => {
                setLocError('');
                if (!navigator.geolocation) {
                    setLocError("不支持定位");
                    return Promise.resolve(null);
                }
                
                return new Promise((resolve) => {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            const lat = pos.coords.latitude;
                            const lng = pos.coords.longitude;
                            setUserLocation({ lat, lng });
                            // 转换为高德坐标
                            const gcj = wgs84ToGcj02(lat, lng);
                            setGcjLocation(gcj);
                            resolve({ wgs: {lat, lng}, gcj });
                        },
                        (err) => {
                            let msg = "定位失败";
                            if (err.code === 1) msg = "权限被拒绝";
                            if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') msg += " (需要HTTPS)";
                            setLocError(msg);
                            resolve(null);
                        },
                        { enableHighAccuracy: true, timeout: 5000 }
                    );
                });
            };

            const connectBluetooth = async () => {
                if (!navigator.bluetooth) {
                    alert("您的浏览器不支持 Web Bluetooth API (请使用 Chrome/Edge)");
                    return;
                }
                try {
                    const device = await navigator.bluetooth.requestDevice({
                        filters: [{ services: ['heart_rate'] }]
                    });
                    const server = await device.gatt.connect();
                    const service = await server.getPrimaryService('heart_rate');
                    const characteristic = await service.getCharacteristic('heart_rate_measurement');
                    await characteristic.startNotifications();
                    characteristic.addEventListener('characteristicvaluechanged', (event) => {
                        const value = event.target.value;
                        const flags = value.getUint8(0);
                        const hr = (flags & 1) ? value.getUint16(1, true) : value.getUint8(1);
                        setHeartRate(hr);
                    });
                    setIsBtConnected(true);
                    alert("✅ 心率设备已连接！");
                } catch (error) {
                    alert("❌ 连接失败: " + error.message);
                }
            };

            // 构造地图链接
            const getMapLink = (loc) => {
                if (!loc) return "位置信息不可用";
                // 使用高德地图URI Scheme，在手机上可以直接唤起APP，在电脑打开网页
                // 高德坐标系: GCJ02
                return `https://uri.amap.com/marker?position=${loc.lng},${loc.lat}&name=用户当前位置&callnative=1`;
            };

            // 发送 - EmailJS 模式
            const sendViaEmailJS = async (reason, targetEmail, targetName, locData) => {
                if (!window.emailjs || !emailConfig.serviceId) return { success: false, msg: "EmailJS未配置" };
                
                const mapLink = getMapLink(locData);
                const templateParams = {
                    to_name: targetName,
                    to_email: targetEmail,
                    user_name: userName || "用户",
                    alert_reason: reason,
                    user_status: "未签到/可能处于危险中",
                    location_link: mapLink,
                    heart_rate: heartRate ? `${heartRate} BPM` : "无数据",
                    last_active: lastCheckIn ? new Date(lastCheckIn).toLocaleString() : '无记录',
                    send_time: new Date().toLocaleString()
                };

                try {
                    await emailjs.send(emailConfig.serviceId, emailConfig.templateId, templateParams);
                    return { success: true, msg: "EmailJS发送成功" };
                } catch (error) {
                    console.error("EmailJS Error:", error);
                    return { success: false, msg: error.text || "EmailJS发送失败" };
                }
            };

            // 发送 - 手动 Mailto 模式 (完全免费/国内直连)
            const sendViaMailto = (reason, contacts, locData) => {
                if (!contacts || contacts.length === 0) return { success: false, msg: "无联系人" };
                
                const emails = contacts.map(c => c.email).join(',');
                const mapLink = getMapLink(locData);
                const subject = `【紧急】${userName || '用户'} ${reason}`;
                const body = `状态：${reason}\n时间：${new Date().toLocaleString()}\n心率：${heartRate ? heartRate + ' BPM' : '无数据'}\n\n📍高德地图定位：\n${mapLink}\n\n请尽快确认安全！`;
                
                // 唤起邮件APP
                window.location.href = `mailto:${emails}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                return { success: true, msg: "已唤起邮件APP，请点击发送" };
            };

            const handleEmergencyTrigger = async (reason) => {
                if (contacts.length === 0) {
                    alert("⚠️ 请先在【配置】页添加联系人！");
                    return;
                }
                
                setIsAutoSending(true);
                const res = await handleGetLocation();
                const locToUse = res ? res.gcj : (gcjLocation || null); // 优先使用最新，否则用缓存
                
                let logs = [];

                if (emailMode === 'auto') {
                    // 自动模式：循环发送
                    for (const contact of contacts) {
                        const r = await sendViaEmailJS(reason, contact.email, contact.name, locToUse);
                        logs.push(`${contact.name}: ${r.msg}`);
                    }
                    alert(`🚨 自动报警结束\n\n${logs.join('\n')}`);
                } else {
                    // 手动模式：唤起一次
                    const r = sendViaMailto(reason, contacts, locToUse);
                    logs.push(r.msg);
                    // 手动模式不需要alert太多，因为mailto本身会跳出页面
                }
                
                setSendLogs(logs);
                setIsAutoSending(false);
            };

            const handleTest = async () => {
                if (!newContactEmail && contacts.length === 0) {
                    alert("⚠️ 请先输入或添加一个联系人邮箱。");
                    return;
                }
                
                const email = newContactEmail || contacts[0].email;
                const name = newContactName || contacts[0].name || "测试者";
                
                // 强制获取一次定位用于测试
                const res = await handleGetLocation();
                const locToUse = res ? res.gcj : (gcjLocation || null);

                if (emailMode === 'auto') {
                    if (!tempEmailConfig.serviceId) {
                        alert("⚠️ 自动模式下，请先填写EmailJS配置。");
                        return;
                    }
                    setEmailConfig(tempEmailConfig); // 保存配置
                    alert("正在尝试通过 EmailJS 发送...");
                    const r = await sendViaEmailJS("手动测试邮件", email, name, locToUse);
                    alert(r.success ? "✅ 发送成功！请检查收件箱/垃圾箱。" : `❌ 失败: ${r.msg}`);
                } else {
                    // 手动模式测试
                    sendViaMailto("手动测试邮件", [{email, name}], locToUse);
                }
            };

            const handleCheckIn = () => {
                const now = new Date();
                const today = now.toISOString().split('T')[0];
                if (history[today]) return;

                const newHistory = { ...history, [today]: true };
                const yest = new Date(now); yest.setDate(yest.getDate() - 1);
                const yestStr = yest.toISOString().split('T')[0];
                
                setStreak(history[yestStr] ? streak + 1 : 1);
                setLastCheckIn(Date.now());
                setHistory(newHistory);
                setFeedbackMsg(WARM_QUOTES[Math.floor(Math.random() * WARM_QUOTES.length)]);
                setStatusLevel('safe');
                setSendLogs([]);
            };

            const isTodayChecked = () => !!history[new Date().toISOString().split('T')[0]];

            const renderCalendar = () => {
                const now = new Date();
                const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
                const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push(<div key={`e-${i}`}></div>);
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const isChecked = history[dateStr];
                    const isToday = d === now.getDate();
                    days.push(
                        <div key={d} className="flex justify-center items-center h-8 w-8 text-sm relative">
                            <span className={isToday ? 'font-bold' : ''}>{d}</span>
                            {isChecked && <div className="absolute inset-0 bg-green-100 text-green-600 rounded-full flex items-center justify-center -z-10"><i className="fas fa-check text-xs"></i></div>}
                        </div>
                    );
                }
                return days;
            };

            if (!mounted) return <div className="min-h-screen bg-gray-100 flex items-center justify-center">Loading...</div>;

            return (
                <div className="min-h-screen pb-24 relative">
                    <div className="bg-white shadow-sm sticky top-0 z-40">
                        <div className="max-w-md mx-auto px-4 py-4 flex justify-between items-center">
                            <h1 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                                <i className="fas fa-shield-cat text-amber-500"></i>
                                {currentTab === 'home' ? '安全签到' : '设置'}
                            </h1>
                            <div className="flex items-center gap-2 text-sm">
                                {isBtConnected && <i className="fas fa-heartbeat text-red-500 animate-pulse"></i>}
                                {userLocation && <i className="fas fa-location-dot text-blue-500"></i>}
                            </div>
                        </div>
                    </div>

                    <div className="max-w-md mx-auto px-4 py-6 space-y-6 animate-fade-in">
                        {currentTab === 'home' && (
                            <>
                                {statusLevel === 'triggered' && (
                                    <div className="bg-red-100 border-l-4 border-red-500 p-4 rounded-r">
                                        <h3 className="text-red-800 font-bold flex items-center gap-2">
                                            {isAutoSending ? <div className="spinner"></div> : <i className="fas fa-exclamation-triangle"></i>}
                                            {isAutoSending ? '正在报警...' : '已触发报警'}
                                        </h3>
                                        <div className="text-red-700 text-xs mt-2">
                                            {emailMode === 'manual' ? '请在弹出的邮件APP中点击发送！' : '系统正在后台尝试联系...'}
                                        </div>
                                    </div>
                                )}

                                <div className="glass-card rounded-2xl p-6 shadow-lg text-center bg-white relative overflow-hidden">
                                    <div className="mb-2 text-gray-500 text-sm">已平安守护</div>
                                    <div className="text-5xl font-bold text-gray-800 mb-2 font-mono">{streak} <span className="text-lg font-normal text-gray-500">天</span></div>
                                    <div className="text-xs text-gray-400 mb-6 flex justify-center gap-3">
                                        <span>上次: {lastCheckIn ? new Date(lastCheckIn).toLocaleDateString() : '无'}</span>
                                        {deadlineTime && <span className="bg-orange-100 text-orange-600 px-2 rounded">截止: {deadlineTime}</span>}
                                    </div>

                                    {!isTodayChecked() ? (
                                        <button onClick={handleCheckIn} className="w-full py-4 bg-gradient-to-r from-amber-400 to-orange-500 text-white rounded-xl shadow-md text-lg font-bold flex justify-center items-center gap-2 active:scale-95 transition">
                                            <i className="fas fa-fingerprint"></i> 报平安
                                        </button>
                                    ) : (
                                        <div className="w-full py-4 bg-green-50 text-green-600 rounded-xl border border-green-100 flex justify-center items-center gap-2">
                                            <i className="fas fa-check-circle"></i> 今日已完成
                                        </div>
                                    )}
                                    {feedbackMsg && <div className="mt-4 text-amber-600 text-sm italic">{feedbackMsg}</div>}
                                </div>

                                <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                                    <div className="grid grid-cols-7 gap-1 text-center text-xs text-gray-400 mb-2">
                                        <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                                    </div>
                                    <div className="grid grid-cols-7 gap-1">{renderCalendar()}</div>
                                </div>
                                
                                <button onClick={() => handleEmergencyTrigger("用户手动SOS")} disabled={isAutoSending} className="w-full py-3 bg-red-50 text-red-600 rounded-xl border border-red-100 text-sm font-bold flex justify-center items-center gap-2 mt-4">
                                    {isAutoSending ? <div className="spinner w-4 h-4 border-red-200 border-l-red-600"></div> : <i className="fas fa-bell"></i>}
                                    {emailMode === 'auto' ? '自动发送SOS' : '手动唤起SOS邮件'}
                                </button>
                                <p className="text-center text-[10px] text-gray-400 mt-2">
                                    当前模式: {emailMode === 'auto' ? 'EmailJS自动发送' : '本机邮件APP发送 (免费/国内)'}
                                </p>
                            </>
                        )}

                        {currentTab === 'mine' && (
                            <>
                                {/* 发送模式选择 */}
                                <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                                    <h3 className="font-bold text-gray-800 mb-4 flex items-center gap-2">
                                        <i className="fas fa-paper-plane text-indigo-500"></i> 
                                        发送模式选择
                                    </h3>
                                    <div className="grid grid-cols-2 gap-3 mb-4">
                                        <button onClick={() => setEmailMode('manual')} className={`p-3 rounded-lg border text-sm flex flex-col items-center gap-1 ${emailMode === 'manual' ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : 'border-gray-200 text-gray-500'}`}>
                                            <i className="fas fa-mobile-screen"></i>
                                            <span className="font-bold">手动 (免费)</span>
                                            <span className="text-[10px]">唤起QQ/网易APP</span>
                                        </button>
                                        <button onClick={() => setEmailMode('auto')} className={`p-3 rounded-lg border text-sm flex flex-col items-center gap-1 ${emailMode === 'auto' ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : 'border-gray-200 text-gray-500'}`}>
                                            <i className="fas fa-robot"></i>
                                            <span className="font-bold">自动 (EmailJS)</span>
                                            <span className="text-[10px]">后台静默发送</span>
                                        </button>
                                    </div>

                                    {/* EmailJS 配置区 (仅在自动模式显示) */}
                                    {emailMode === 'auto' && (
                                        <div className="bg-orange-50 p-4 rounded-lg border border-orange-100 animate-fade-in">
                                            <p className="text-[10px] text-orange-800 mb-2 font-bold">EmailJS 配置 (每月200封免费):</p>
                                            <div className="space-y-2">
                                                <input type="text" value={tempEmailConfig.serviceId} onChange={e => setTempEmailConfig({...tempEmailConfig, serviceId: e.target.value})} placeholder="Service ID" className="w-full p-2 border rounded text-xs" />
                                                <input type="text" value={tempEmailConfig.templateId} onChange={e => setTempEmailConfig({...tempEmailConfig, templateId: e.target.value})} placeholder="Template ID" className="w-full p-2 border rounded text-xs" />
                                                <input type="text" value={tempEmailConfig.publicKey} onChange={e => setTempEmailConfig({...tempEmailConfig, publicKey: e.target.value})} placeholder="Public Key" className="w-full p-2 border rounded text-xs" />
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                                    <h3 className="font-bold text-gray-800 mb-4 text-sm"><i className="fas fa-users text-blue-500"></i> 紧急联系人</h3>
                                    <div className="space-y-2 mb-3">
                                        {contacts.map(c => (
                                            <div key={c.id} className="flex justify-between p-2 bg-gray-50 rounded text-sm items-center">
                                                <span>{c.name} <span className="text-gray-400 text-xs">({c.email})</span></span>
                                                <button onClick={() => setContacts(contacts.filter(x => x.id !== c.id))} className="text-gray-300 hover:text-red-500"><i className="fas fa-times"></i></button>
                                            </div>
                                        ))}
                                        {contacts.length === 0 && <div className="text-xs text-center text-gray-400">无联系人</div>}
                                    </div>
                                    <div className="flex gap-2 mb-3">
                                        <input type="text" placeholder="称呼" className="w-1/3 p-2 border rounded text-sm" value={newContactName} onChange={e => setNewContactName(e.target.value)} />
                                        <input type="email" placeholder="邮箱" className="flex-1 p-2 border rounded text-sm" value={newContactEmail} onChange={e => setNewContactEmail(e.target.value)} />
                                        <button onClick={() => {
                                            if(!newContactName || !newContactEmail) return;
                                            setContacts([...contacts, {id: Date.now(), name: newContactName, email: newContactEmail}]);
                                            setNewContactName(''); setNewContactEmail('');
                                        }} className="px-3 bg-blue-500 text-white rounded text-sm">添加</button>
                                    </div>
                                    <button onClick={handleTest} className="w-full py-2 border border-blue-200 text-blue-600 rounded text-sm hover:bg-blue-50">
                                        <i className="fas fa-paper-plane mr-1"></i> 测试发送 (当前模式)
                                    </button>
                                </div>

                                <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                                    <h3 className="font-bold text-gray-800 mb-4 text-sm"><i className="fas fa-gear text-gray-400"></i> 设备与设置</h3>
                                    <div className="space-y-3">
                                        <input type="text" value={userName} onChange={(e) => setUserName(e.target.value)} placeholder="您的昵称" className="w-full p-2 border rounded text-sm bg-gray-50" />
                                        <div className="flex justify-between items-center">
                                            <span className="text-xs text-gray-500">自动报警截止时间</span>
                                            <input type="time" value={deadlineTime} onChange={(e) => setDeadlineTime(e.target.value)} className="p-1 border rounded text-sm bg-gray-50" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <button onClick={() => {
                                                handleGetLocation().then(res => {
                                                    const loc = res ? res.gcj : null;
                                                    alert(loc ? `✅ 高德坐标获取成功:\n${loc.lat.toFixed(5)}, ${loc.lng.toFixed(5)}` : `❌ ${locError}`);
                                                });
                                            }} className="py-2 bg-blue-50 text-blue-600 rounded text-sm border border-blue-100 flex flex-col items-center justify-center">
                                                <i className={`fas fa-location-dot mb-1 ${userLocation ? 'text-blue-600' : 'text-gray-400'}`}></i>
                                                {userLocation ? '刷新定位' : '授权定位'}
                                            </button>
                                            <button onClick={connectBluetooth} className={`py-2 rounded text-sm border flex flex-col items-center justify-center ${isBtConnected ? 'bg-red-50 text-red-600 border-red-100' : 'bg-gray-50 text-gray-600 border-gray-200'}`}>
                                                <i className={`fas fa-heartbeat mb-1 ${isBtConnected ? 'animate-pulse text-red-500' : 'text-gray-400'}`}></i>
                                                {isBtConnected ? `${heartRate || '--'} BPM` : '连接心率'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </>
                        )}
                    </div>
                    <TabBar currentTab={currentTab} onTabChange={setCurrentTab} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>每日安全签到 - 修复版</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f3f4f6;
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .spinner {
            border: 3px solid rgba(0, 0, 0, 0.1);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border-left-color: #000;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const STORAGE_KEY = 'daily_safety_checkin_pro_v2';
        const WARM_QUOTES = [
            "平安是福，点亮心灯。", "今日无事，便是好时节。", 
            "即使独行，也有星光。", "好好生活，慢慢相遇。",
            "世界很大，有人在等你。", "每一个日子都值得起舞。"
        ];

        // 底部导航组件
        const TabBar = ({ currentTab, onTabChange }) => (
            <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-6 py-3 flex justify-between items-center z-50 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                <button onClick={() => onTabChange('home')} className={`flex flex-col items-center gap-1 transition-colors ${currentTab === 'home' ? 'text-amber-500' : 'text-gray-400'}`}>
                    <i className="fas fa-shield-halved text-xl"></i><span className="text-[10px]">守护</span>
                </button>
                <div className="w-px h-8 bg-gray-100"></div>
                <button onClick={() => onTabChange('mine')} className={`flex flex-col items-center gap-1 transition-colors ${currentTab === 'mine' ? 'text-amber-500' : 'text-gray-400'}`}>
                    <i className="fas fa-sliders text-xl"></i><span className="text-[10px]">配置</span>
                </button>
            </div>
        );

        const App = () => {
            const [currentTab, setCurrentTab] = useState('home');
            const [mounted, setMounted] = useState(false);
            
            // 核心数据
            const [userName, setUserName] = useState('');
            const [lastCheckIn, setLastCheckIn] = useState(null);
            const [streak, setStreak] = useState(0);
            const [history, setHistory] = useState({}); 
            const [contacts, setContacts] = useState([]);
            const [deadlineTime, setDeadlineTime] = useState('');
            
            // EmailJS 配置 (持久化)
            const [emailConfig, setEmailConfig] = useState({
                serviceId: '',
                templateId: '',
                publicKey: ''
            });

            // 运行时状态
            const [userLocation, setUserLocation] = useState(null);
            const [locError, setLocError] = useState('');
            const [feedbackMsg, setFeedbackMsg] = useState('');
            const [statusLevel, setStatusLevel] = useState('safe');
            const [isAutoSending, setIsAutoSending] = useState(false);
            const [sendLogs, setSendLogs] = useState([]); 

            // 表单输入 (临时)
            const [newContactName, setNewContactName] = useState('');
            const [newContactEmail, setNewContactEmail] = useState('');
            const [tempEmailConfig, setTempEmailConfig] = useState({...emailConfig});
            const [isTesting, setIsTesting] = useState(false);

            // --- 初始化 ---
            useEffect(() => {
                const savedData = localStorage.getItem(STORAGE_KEY);
                if (savedData) {
                    try {
                        const parsed = JSON.parse(savedData);
                        setLastCheckIn(parsed.lastCheckIn);
                        setStreak(parsed.streak || 0);
                        setHistory(parsed.history || {});
                        setContacts(parsed.contacts || []);
                        setDeadlineTime(parsed.deadlineTime || '');
                        setUserName(parsed.userName || '');
                        if (parsed.emailConfig) {
                            setEmailConfig(parsed.emailConfig);
                            setTempEmailConfig(parsed.emailConfig);
                            // 初始化 SDK
                            if (parsed.emailConfig.publicKey && window.emailjs) {
                                emailjs.init(parsed.emailConfig.publicKey);
                            }
                        }
                    } catch(e) { console.error("Load error", e); }
                }
                setMounted(true);
            }, []);

            // --- 数据持久化 ---
            useEffect(() => {
                if (!mounted) return;
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ 
                    lastCheckIn, streak, history, contacts, deadlineTime, userName, emailConfig
                }));
            }, [lastCheckIn, streak, history, contacts, deadlineTime, userName, emailConfig, mounted]);

            // --- 智能监控 (每10秒) ---
            useEffect(() => {
                if (!mounted) return;
                const timer = setInterval(() => {
                    const now = new Date();
                    
                    // 1. 状态计算
                    if (lastCheckIn) {
                        const hours = (now.getTime() - lastCheckIn) / 3600000;
                        if (hours < 24) setStatusLevel('safe');
                        else if (hours >= 24 && hours < 48) setStatusLevel('warning');
                        else setStatusLevel('danger');
                    }
                    
                    // 2. 截止时间触发器
                    if (deadlineTime && !isTodayChecked()) {
                        const [h, m] = deadlineTime.split(':').map(Number);
                        const deadline = new Date();
                        deadline.setHours(h, m, 0, 0);
                        
                        if (now > deadline && (now - deadline) < 300000) {
                            if (!isAutoSending && statusLevel !== 'triggered') {
                                console.log("Auto-trigger deadline...");
                                setStatusLevel('triggered');
                                handleEmergencyTrigger("超时未签到自动触发");
                            }
                        }
                    }
                }, 10000);
                return () => clearInterval(timer);
            }, [lastCheckIn, deadlineTime, isAutoSending, statusLevel, mounted]);

            // --- 功能函数 ---

            const handleGetLocation = () => {
                setLocError('');
                if (!navigator.geolocation) {
                    setLocError("不支持定位");
                    return Promise.resolve(null);
                }
                
                return new Promise((resolve) => {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            const loc = {lat: pos.coords.latitude, lng: pos.coords.longitude};
                            setUserLocation(loc);
                            resolve(loc);
                        },
                        (err) => {
                            let msg = "定位失败";
                            if (err.code === 1) msg = "权限被拒绝";
                            if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') msg += " (需要HTTPS)";
                            setLocError(msg);
                            resolve(null);
                        },
                        { enableHighAccuracy: true, timeout: 5000 }
                    );
                });
            };

            // 发送邮件通用函数 (支持传入特定的配置进行测试)
            const executeSendEmail = async (reason, targetEmail, targetName, locData, customConfig = null) => {
                // 优先使用传入的配置(用于测试)，否则使用保存的配置
                const configToUse = customConfig || emailConfig;

                if (!window.emailjs) return { success: false, msg: "网络错误: EmailJS SDK加载失败" };
                if (!configToUse.serviceId || !configToUse.publicKey) return { success: false, msg: "未配置 Service ID 或 Public Key" };

                // 确保使用正确的 Key 初始化
                try { emailjs.init(configToUse.publicKey); } catch(e) { console.error(e); }

                const mapLink = locData 
                    ? `https://www.google.com/maps?q=${locData.lat},${locData.lng}` 
                    : "位置信息不可用";

                const templateParams = {
                    to_name: targetName,
                    to_email: targetEmail,
                    user_name: userName || "用户",
                    alert_reason: reason,
                    user_status: "未签到/可能处于危险中",
                    location_link: mapLink,
                    last_active: lastCheckIn ? new Date(lastCheckIn).toLocaleString() : '无记录',
                    send_time: new Date().toLocaleString()
                };

                try {
                    await emailjs.send(configToUse.serviceId, configToUse.templateId, templateParams);
                    return { success: true, msg: "发送成功" };
                } catch (error) {
                    console.error("EmailJS Error:", error);
                    let failReason = error.text || "未知错误";
                    if (error.status === 412 || (error.text && error.text.includes("insufficient"))) {
                        failReason = "权限不足(412): 请在EmailJS后台重新连接Gmail并勾选发送权限。";
                    } else if (error.status === 400) {
                        failReason = "参数错误(400): ID填写错误，或者Template中没有配置{{to_email}}字段。";
                    }
                    return { success: false, msg: failReason };
                }
            };

            // 触发报警 (使用保存的配置)
            const handleEmergencyTrigger = async (reason) => {
                if (contacts.length === 0) {
                    alert("⚠️ 无法报警：请先在【配置】页添加联系人！");
                    return;
                }
                
                setIsAutoSending(true);
                const loc = await handleGetLocation(); 
                
                const logs = [];
                for (const contact of contacts) {
                    const res = await executeSendEmail(reason, contact.email, contact.name, loc || userLocation);
                    logs.push(`${contact.name}: ${res.msg}`);
                }
                
                setSendLogs(logs);
                setIsAutoSending(false);
                
                const allFailed = logs.every(l => l.includes("失败") || l.includes("错误") || l.includes("412") || l.includes("未配置"));
                
                if (allFailed) {
                     alert(`🚨 报警失败！\n原因：${logs[0]}\n\n请检查【配置】页是否已保存正确的ID和Key。`);
                } else {
                     alert(`🚨 报警流程结束\n\n${logs.join('\n')}\n\n注意：如果显示成功但没收到，请检查【垃圾邮件】或EmailJS额度。`);
                }
            };

            // 测试发送 (使用输入框当前的配置，无需先保存)
            const handleTest = async () => {
                if (!newContactEmail && contacts.length === 0) {
                    alert("⚠️ 请先在下方输入一个邮箱地址，或者添加一位联系人，系统才知道发给谁。");
                    return;
                }
                
                if (!tempEmailConfig.serviceId || !tempEmailConfig.templateId || !tempEmailConfig.publicKey) {
                    alert("⚠️ 请先填完整上方的 Service ID, Template ID 和 Public Key。");
                    return;
                }

                setIsTesting(true);
                const email = newContactEmail || contacts[0].email;
                const name = newContactName || contacts[0].name || "测试者";
                
                // 强制保存一下，防止用户忘了
                setEmailConfig(tempEmailConfig);
                
                // 使用当前的 tempEmailConfig 进行发送
                const res = await executeSendEmail("这是一封手动测试邮件", email, name, userLocation, tempEmailConfig);
                
                setIsTesting(false);

                if (res.success) {
                    alert(`✅ 发送成功！\n\n已尝试发给: ${email}\n\n如果收件箱没看到，请务必检查【垃圾邮件/Spam】文件夹！`);
                } else {
                    alert(`❌ 发送失败\n\n错误信息: ${res.msg}\n\n请核对三个ID是否有多余空格。`);
                }
            };

            const handleCheckIn = () => {
                const now = new Date();
                const today = now.toISOString().split('T')[0];
                if (history[today]) return;

                const newHistory = { ...history, [today]: true };
                const yest = new Date(now); yest.setDate(yest.getDate() - 1);
                const yestStr = yest.toISOString().split('T')[0];
                
                setStreak(history[yestStr] ? streak + 1 : 1);
                setLastCheckIn(Date.now());
                setHistory(newHistory);
                setFeedbackMsg(WARM_QUOTES[Math.floor(Math.random() * WARM_QUOTES.length)]);
                setStatusLevel('safe');
                setSendLogs([]);
            };

            const isTodayChecked = () => !!history[new Date().toISOString().split('T')[0]];

            const saveSettings = () => {
                setEmailConfig(tempEmailConfig);
                try {
                    if (window.emailjs) {
                        emailjs.init(tempEmailConfig.publicKey);
                        alert("✅ 配置已保存！");
                    } else {
                        alert("⚠️ 配置已保存，但检测到网络问题，EmailJS SDK未加载。");
                    }
                } catch(e) {
                    alert("⚠️ Public Key 格式看起来不对，请检查。");
                }
            };

            const renderCalendar = () => {
                const now = new Date();
                const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
                const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push(<div key={`e-${i}`}></div>);
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const isChecked = history[dateStr];
                    const isToday = d === now.getDate();
                    days.push(
                        <div key={d} className="flex justify-center items-center h-8 w-8 text-sm relative">
                            <span className={isToday ? 'font-bold' : ''}>{d}</span>
                            {isChecked && <div className="absolute inset-0 bg-green-100 text-green-600 rounded-full flex items-center justify-center -z-10"><i className="fas fa-check text-xs"></i></div>}
                        </div>
                    );
                }
                return days;
            };

            if (!mounted) return <div className="min-h-screen bg-gray-100 flex items-center justify-center">Loading...</div>;

            return (
                <div className="min-h-screen pb-24 relative">
                    <div className="bg-white shadow-sm sticky top-0 z-40">
                        <div className="max-w-md mx-auto px-4 py-4 flex justify-between items-center">
                            <h1 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                                <i className="fas fa-shield-cat text-amber-500"></i>
                                {currentTab === 'home' ? '安全签到' : '系统配置'}
                            </h1>
                            {userLocation && <i className="fas fa-location-dot text-blue-500"></i>}
                        </div>
                    </div>

                    <div className="max-w-md mx-auto px-4 py-6 space-y-6 animate-fade-in">
                        {currentTab === 'home' && (
                            <>
                                {statusLevel === 'triggered' && (
                                    <div className="bg-red-100 border-l-4 border-red-500 p-4 rounded-r">
                                        <h3 className="text-red-800 font-bold flex items-center gap-2">
                                            {isAutoSending ? <div className="spinner"></div> : <i className="fas fa-exclamation-triangle"></i>}
                                            {isAutoSending ? '正在发送报警...' : '已触发报警'}
                                        </h3>
                                        <div className="text-red-700 text-xs mt-2">
                                            {sendLogs.length > 0 ? sendLogs.map((log, i) => <div key={i}>{log}</div>) : '系统正在尝试联系后台...'}
                                        </div>
                                    </div>
                                )}

                                <div className="glass-card rounded-2xl p-6 shadow-lg text-center bg-white relative overflow-hidden">
                                    <div className="mb-2 text-gray-500 text-sm">已平安守护</div>
                                    <div className="text-5xl font-bold text-gray-800 mb-2 font-mono">{streak} <span className="text-lg font-normal text-gray-500">天</span></div>
                                    <div className="text-xs text-gray-400 mb-6 flex justify-center gap-3">
                                        <span>上次: {lastCheckIn ? new Date(lastCheckIn).toLocaleDateString() : '无'}</span>
                                        {deadlineTime && <span className="bg-orange-100 text-orange-600 px-2 rounded">截止: {deadlineTime}</span>}
                                    </div>

                                    {!isTodayChecked() ? (
                                        <button onClick={handleCheckIn} className="w-full py-4 bg-gradient-to-r from-amber-400 to-orange-500 text-white rounded-xl shadow-md text-lg font-bold flex justify-center items-center gap-2 active:scale-95 transition">
                                            <i className="fas fa-fingerprint"></i> 报平安
                                        </button>
                                    ) : (
                                        <div className="w-full py-4 bg-green-50 text-green-600 rounded-xl border border-green-100 flex justify-center items-center gap-2">
                                            <i className="fas fa-check-circle"></i> 今日已完成
                                        </div>
                                    )}
                                    {feedbackMsg && <div className="mt-4 text-amber-600 text-sm italic">{feedbackMsg}</div>}
                                </div>

                                <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                                    <div className="grid grid-cols-7 gap-1 text-center text-xs text-gray-400 mb-2">
                                        <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                                    </div>
                                    <div className="grid grid-cols-7 gap-1">{renderCalendar()}</div>
                                </div>
                                
                                <button onClick={() => handleEmergencyTrigger("用户手动SOS")} disabled={isAutoSending} className="w-full py-3 bg-red-50 text-red-600 rounded-xl border border-red-100 text-sm font-bold flex justify-center items-center gap-2 mt-4">
                                    {isAutoSending ? <div className="spinner w-4 h-4 border-red-200 border-l-red-600"></div> : <i className="fas fa-bell"></i>}
                                    立即发送SOS邮件
                                </button>
                            </>
                        )}

                        {currentTab === 'mine' && (
                            <>
                                {/* EmailJS 配置区 */}
                                <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100 border-l-4 border-l-orange-400">
                                    <h3 className="font-bold text-gray-800 mb-2 flex items-center gap-2">
                                        <i className="fas fa-envelope-open-text text-orange-500"></i> 
                                        邮件服务 (必填)
                                    </h3>
                                    <p className="text-[10px] text-gray-400 mb-4 bg-gray-50 p-2 rounded">
                                        请前往 emailjs.com 获取 ID。
                                        <br/>如果“没有任何反应”，请检查网络或Public Key。
                                    </p>
                                    
                                    <div className="space-y-3">
                                        <div>
                                            <label className="text-[10px] uppercase font-bold text-gray-400">Service ID</label>
                                            <input type="text" value={tempEmailConfig.serviceId} onChange={e => setTempEmailConfig({...tempEmailConfig, serviceId: e.target.value})} placeholder="例: service_x9z..." className="w-full p-2 border rounded text-sm bg-gray-50 font-mono" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase font-bold text-gray-400">Template ID</label>
                                            <input type="text" value={tempEmailConfig.templateId} onChange={e => setTempEmailConfig({...tempEmailConfig, templateId: e.target.value})} placeholder="例: template_k2..." className="w-full p-2 border rounded text-sm bg-gray-50 font-mono" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase font-bold text-gray-400">Public Key</label>
                                            <input type="text" value={tempEmailConfig.publicKey} onChange={e => setTempEmailConfig({...tempEmailConfig, publicKey: e.target.value})} placeholder="例: user_123... 或随机字符" className="w-full p-2 border rounded text-sm bg-gray-50 font-mono" />
                                        </div>
                                        
                                        <div className="flex gap-2 pt-2">
                                            <button onClick={saveSettings} className="flex-1 py-2 bg-gray-800 text-white rounded text-sm hover:bg-gray-900">保存配置</button>
                                            <button onClick={handleTest} disabled={isTesting} className="px-4 py-2 border border-gray-300 rounded text-sm hover:bg-gray-50 flex items-center gap-2">
                                                {isTesting && <div className="spinner w-3 h-3"></div>}
                                                测试发送
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                                    <h3 className="font-bold text-gray-800 mb-4 text-sm"><i className="fas fa-users text-blue-500"></i> 紧急联系人</h3>
                                    <div className="space-y-2 mb-3">
                                        {contacts.map(c => (
                                            <div key={c.id} className="flex justify-between p-2 bg-gray-50 rounded text-sm items-center">
                                                <span>{c.name} <span className="text-gray-400 text-xs">({c.email})</span></span>
                                                <button onClick={() => setContacts(contacts.filter(x => x.id !== c.id))} className="text-gray-300 hover:text-red-500"><i className="fas fa-times"></i></button>
                                            </div>
                                        ))}
                                        {contacts.length === 0 && <div className="text-xs text-center text-gray-400">请添加至少一位联系人，否则无法发送</div>}
                                    </div>
                                    <div className="flex gap-2">
                                        <input type="text" placeholder="称呼" className="w-1/3 p-2 border rounded text-sm" value={newContactName} onChange={e => setNewContactName(e.target.value)} />
                                        <input type="email" placeholder="邮箱" className="flex-1 p-2 border rounded text-sm" value={newContactEmail} onChange={e => setNewContactEmail(e.target.value)} />
                                        <button onClick={() => {
                                            if(!newContactName || !newContactEmail) return;
                                            setContacts([...contacts, {id: Date.now(), name: newContactName, email: newContactEmail}]);
                                            setNewContactName(''); setNewContactEmail('');
                                        }} className="px-3 bg-blue-500 text-white rounded text-sm">添加</button>
                                    </div>
                                </div>

                                <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
                                    <h3 className="font-bold text-gray-800 mb-4 text-sm"><i className="fas fa-gear text-gray-400"></i> 通用设置</h3>
                                    <div className="space-y-3">
                                        <input type="text" value={userName} onChange={(e) => setUserName(e.target.value)} placeholder="您的昵称" className="w-full p-2 border rounded text-sm bg-gray-50" />
                                        <div className="flex justify-between items-center">
                                            <span className="text-xs text-gray-500">自动报警截止时间</span>
                                            <input type="time" value={deadlineTime} onChange={(e) => setDeadlineTime(e.target.value)} className="p-1 border rounded text-sm bg-gray-50" />
                                        </div>
                                        <button onClick={() => {
                                            handleGetLocation().then(loc => alert(loc ? `✅ 成功获取: ${loc.lat.toFixed(4)}, ${loc.lng.toFixed(4)}` : `❌ ${locError}`));
                                        }} className="w-full py-2 bg-gray-100 text-gray-600 rounded text-sm border border-gray-200">
                                            {userLocation ? '✅ 已获定位权限 (点击刷新)' : '📍 预先授权定位 (推荐)'}
                                        </button>
                                    </div>
                                </div>
                            </>
                        )}
                    </div>
                    <TabBar currentTab={currentTab} onTabChange={setCurrentTab} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

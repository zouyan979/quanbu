<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心率核心监测 // 生物反馈系统</title>
    <!-- 防止 favicon 404 报错 -->
    <link rel="icon" href="data:;base64,=">
    <style>
        :root {
            --primary-color: #ff3366; /* 霓虹红粉色 */
            --bg-color: #050505;     /* 极深灰/黑 */
            --text-color: #ffffff;
            --grid-color: rgba(255, 51, 102, 0.15);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace, "微软雅黑"; /* 添加中文字体支持 */
            overflow: hidden; /* 禁止滚动 */
            user-select: none;
        }

        /* 画布层级管理 */
        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #ecgCanvas {
            position: absolute;
            top: 50%; /* 垂直居中 */
            left: 0;
            width: 100%;
            height: 400px; /* 加高一点，防止波形切断 */
            transform: translateY(-50%);
            z-index: 2;
            /* 发光效果，让线条看起来像荧光管 */
            filter: drop-shadow(0 0 4px var(--primary-color));
        }

        /* UI 界面层 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none; /* 让鼠标事件穿透到下层，除非点按钮 */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            box-sizing: border-box;
        }

        /* 顶部信息 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .title {
            font-size: 16px; /*稍微调大适合中文*/
            letter-spacing: 2px;
            opacity: 0.7;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .bpm-display {
            text-align: right;
        }

        #bpm-value {
            font-size: 8rem;
            line-height: 1;
            font-weight: bold;
            color: var(--primary-color);
            text-shadow: 0 0 20px rgba(255, 51, 102, 0.5);
            transition: color 0.3s;
        }

        .bpm-unit {
            font-size: 1.5rem;
            opacity: 0.8;
            font-family: "微软雅黑";
        }

        /* 底部控制栏 */
        .controls {
            pointer-events: auto; /* 允许点击 */
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap; /* 防止小屏幕溢出 */
        }

        button {
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 10px 20px;
            font-family: inherit; /* 继承父级字体设置 */
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        button:hover {
            background: var(--primary-color);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--primary-color);
        }

        button:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 状态指示灯 */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .led {
            width: 10px;
            height: 10px;
            background-color: #333;
            border-radius: 50%;
            box-shadow: 0 0 5px #333;
        }

        .led.active {
            background-color: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-color);
            animation: blink 1s infinite;
        }
        
        .led.flatline {
             background-color: #ff0000;
             box-shadow: 0 0 20px #ff0000;
             animation: none;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 网格背景装饰 */
        .grid-bg {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 200px;
            transform: translateY(-50%);
            border-top: 1px solid var(--grid-color);
            border-bottom: 1px solid var(--grid-color);
            background: linear-gradient(90deg, transparent 0%, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 100%;
            z-index: 1;
            opacity: 0.3;
            pointer-events: none;
        }

        #error-msg {
            color: #ff0000;
            font-size: 14px;
            margin-top: 10px;
            display: none;
            max-width: 500px;
            background: rgba(20, 0, 0, 0.9);
            padding: 15px;
            border: 1px solid #ff0000;
            white-space: pre-wrap;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <!-- 背景粒子画布 -->
    <canvas id="particleCanvas"></canvas>
    
    <!-- 装饰网格 -->
    <div class="grid-bg"></div>

    <!-- 心电图画布 -->
    <canvas id="ecgCanvas"></canvas>

    <!-- UI 层 -->
    <div id="ui-layer">
        <div class="header">
            <div>
                <div class="title">系统状态: <span id="connection-status">等待连接</span></div>
                <div class="title">当前设备: <span id="device-name">--</span></div>
            </div>
            <div class="bpm-display">
                <span id="bpm-value">--</span>
                <span class="bpm-unit">次/分</span>
            </div>
        </div>

        <div class="controls">
            <button id="btn-connect">连接设备</button>
            <button id="btn-audio">静音</button>
            <div class="status-indicator">
                <div class="led" id="pulse-led"></div>
                <span id="status-text">无信号</span>
            </div>
        </div>
        <!-- 错误提示单独放一行 -->
        <div id="error-msg"></div>
    </div>

    <script>
        /**
         * 1. 粒子特效系统 (Particle System)
         */
        const pCanvas = document.getElementById('particleCanvas');
        const pCtx = pCanvas.getContext('2d');
        
        let particles = [];
        let pulseIntensity = 0; // 心跳冲击波强度 (0.0 - 1.0)

        // 自适应屏幕
        function resizeCanvas() {
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
            // 心电图高度
            ecgCanvas.width = window.innerWidth;
            ecgCanvas.height = 400; 
        }
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * pCanvas.width;
                this.y = Math.random() * pCanvas.height;
                this.z = Math.random(); 
                this.size = Math.random() * 2 + 1;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.alpha = Math.random() * 0.5 + 0.1;
            }

            update(surge) {
                let speedMultiplier = 1 + (surge * 10);

                this.x += this.vx * speedMultiplier;
                this.y += this.vy * speedMultiplier;

                if (surge > 0.1) {
                    const cx = pCanvas.width / 2;
                    const cy = pCanvas.height / 2;
                    const dx = this.x - cx;
                    const dy = this.y - cy;
                    this.x += dx * 0.02 * surge;
                    this.y += dy * 0.02 * surge;
                }

                if (this.x < 0 || this.x > pCanvas.width || this.y < 0 || this.y > pCanvas.height) {
                    this.reset();
                }
            }

            draw(ctx, surge) {
                ctx.beginPath();
                const currentSize = this.size * (1 + surge * 2); 
                const currentAlpha = Math.min(this.alpha + surge, 1);
                
                ctx.arc(this.x, this.y, currentSize, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 51, 102, ${currentAlpha})`;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const count = (window.innerWidth * window.innerHeight) / 8000;
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        /**
         * 2. ECG 绘制系统 (全新扫描逻辑)
         */
        const ecgCanvas = document.getElementById('ecgCanvas');
        const ecgCtx = ecgCanvas.getContext('2d');
        
        // 核心变量
        let ecgX = 0;
        const centerY = 200; // 画布高度400的一半
        let lastEcgY = centerY; 
        
        let currentBPM = 0;
        let lastBeatTime = 0;
        let isConnected = false;
        let isFlatline = false;
        
        // 波形队列
        let waveQueue = []; 

        function generateHeartbeat() {
            // 生成更像真实心电图的波形数据
            // dx: X轴前进距离, dy: Y轴绝对位置（相对于中线）
            // 注意：这里我们改用相对偏移推入队列
            
            // P Wave (小凸起)
            waveQueue.push({dx: 4, dy: -15});
            waveQueue.push({dx: 4, dy: 0});
            
            // PR Interval (平)
            waveQueue.push({dx: 4, dy: 0});

            // Q Wave (下沉)
            waveQueue.push({dx: 2, dy: 10});

            // R Wave (巨大的向上脉冲)
            waveQueue.push({dx: 3, dy: -120}); // 冲得更高
            
            // S Wave (巨大的向下回弹)
            waveQueue.push({dx: 3, dy: 30});

            // ST Segment (回中)
            waveQueue.push({dx: 3, dy: 0});

            // T Wave (中等凸起)
            waveQueue.push({dx: 6, dy: -25});
            waveQueue.push({dx: 6, dy: 0});

            // 触发特效
            pulseIntensity = 1.0; 
            playBeep();
            flashLed();
        }

        /**
         * 3. 音频系统
         */
        let audioCtx;
        let audioEnabled = true;
        let flatlineOscillator = null;

        function initAudio() {
            if (!audioCtx) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    console.error("Audio Context Init Failed:", e);
                }
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playBeep() {
            if (!audioEnabled || !audioCtx) return;
            if (isFlatline) return; 

            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.frequency.value = 600 + (currentBPM * 2); 
                osc.type = 'triangle';

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start();
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.stop(audioCtx.currentTime + 0.15);
            } catch (e) { }
        }

        function startFlatlineSound() {
            if (!audioEnabled || !audioCtx || flatlineOscillator) return;
            try {
                flatlineOscillator = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                flatlineOscillator.frequency.value = 400; 
                flatlineOscillator.type = 'sine';
                flatlineOscillator.connect(gain);
                gain.connect(audioCtx.destination);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                flatlineOscillator.start();
            } catch (e) { }
        }

        function stopFlatlineSound() {
            if (flatlineOscillator) {
                try { flatlineOscillator.stop(); } catch(e) {}
                flatlineOscillator = null;
            }
        }

        /**
         * 4. 蓝牙逻辑
         */
        const btnConnect = document.getElementById('btn-connect');
        const statusText = document.getElementById('status-text');
        const bpmValue = document.getElementById('bpm-value');
        const led = document.getElementById('pulse-led');
        const connectionStatus = document.getElementById('connection-status');
        const deviceNameDisplay = document.getElementById('device-name');
        const errorMsg = document.getElementById('error-msg');

        btnConnect.addEventListener('click', async () => {
            initAudio(); 
            errorMsg.style.display = 'none';
            errorMsg.innerText = "";
            stopFlatlineSound();
            isFlatline = false;

            try {
                if (!navigator.bluetooth) throw new Error("您的浏览器不支持蓝牙功能，请使用 Chrome 或 Edge。");

                connectionStatus.innerText = "正在扫描...";
                connectionStatus.style.color = "yellow";
                
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['heart_rate'] }],
                    optionalServices: ['heart_rate']
                });

                deviceNameDisplay.innerText = device.name;
                connectionStatus.innerText = "正在连接...";

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('heart_rate');
                const characteristic = await service.getCharacteristic('heart_rate_measurement');

                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleHeartRateChanged);
                
                device.addEventListener('gattserverdisconnected', onDisconnected);

                isConnected = true;
                connectionStatus.innerText = "已连接 / 监测中";
                connectionStatus.style.color = "#00ff00";
                statusText.innerText = "信号已捕获";
                btnConnect.innerText = "断开连接";
                
                lastBeatTime = Date.now();
                isFlatline = false;
                stopFlatlineSound();

                btnConnect.onclick = () => {
                   if(device.gatt.connected) device.gatt.disconnect();
                };

            } catch (error) {
                console.error(error);
                let msg = "连接错误: " + error.message;
                if (error.name === 'NetworkError') {
                    msg = "无法连接设备。\n请确保：\n1. 手表已断开与手机APP的连接\n2. 手表屏幕已点亮\n3. 刷新页面重试";
                }
                errorMsg.innerText = msg;
                errorMsg.style.display = 'block';
                connectionStatus.innerText = "连接失败";
                connectionStatus.style.color = "red";
                stopFlatlineSound();
            }
        });

        function onDisconnected() {
            isConnected = false;
            currentBPM = 0;
            bpmValue.innerText = "--"; // 重置显示
            connectionStatus.innerText = "已断开连接";
            connectionStatus.style.color = "red";
            statusText.innerText = "无信号";
            btnConnect.innerText = "连接设备";
            stopFlatlineSound();
            btnConnect.onclick = () => location.reload();
        }

        function handleHeartRateChanged(event) {
            const value = event.target.value;
            const flags = value.getUint8(0);
            let bpm = 0;
            if (flags & 1) { 
                bpm = value.getUint16(1, true); 
            } else {
                bpm = value.getUint8(1);
            }

            const now = Date.now();
            currentBPM = bpm;
            bpmValue.innerText = bpm; // 更新界面
            lastBeatTime = now;
            
            // 恢复正常状态
            if (isFlatline) {
                isFlatline = false;
                stopFlatlineSound();
                statusText.innerText = "心律稳定";
                led.classList.remove('flatline');
                bpmValue.style.color = "var(--primary-color)";
            }
        }

        function flashLed() {
            led.classList.add('active');
            setTimeout(() => led.classList.remove('active'), 100);
        }

        let nextBeatTime = 0;

        /**
         * 5. 主动画循环 (Loop)
         */
        function animate() {
            requestAnimationFrame(animate);

            // A. 粒子背景
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            pulseIntensity *= 0.92; 
            if (pulseIntensity < 0.01) pulseIntensity = 0;
            particles.forEach(p => {
                p.update(pulseIntensity);
                p.draw(pCtx, pulseIntensity);
            });

            // B. 逻辑处理
            const now = Date.now();

            if (isConnected) {
                // 生成心跳
                if (currentBPM > 0) {
                    const interval = 60000 / currentBPM;
                    if (now >= nextBeatTime) {
                        generateHeartbeat(); 
                        nextBeatTime = now + interval;
                    }
                }

                // --- 修复点：看门狗逻辑完善 ---
                // 如果超过5秒没收到数据，强制归零
                if (now - lastBeatTime > 5000) {
                    if (!isFlatline) {
                        isFlatline = true;
                        startFlatlineSound();
                        
                        // 强制更新UI状态
                        statusText.innerText = "警告 / 信号丢失";
                        bpmValue.innerText = "--"; // 清空数字
                        currentBPM = 0;
                        
                        led.classList.add('flatline');
                        bpmValue.style.color = "#ff0000"; // 数字变红
                        pulseIntensity = 0;
                    }
                }
            } else {
                pulseIntensity = 0;
            }

            // C. 优化的 ECG 绘制 (扫描刷模式)
            // 1. 确定速度
            let speed = 3; // 基础速度
            if(isConnected && !isFlatline && currentBPM > 0) {
                speed = (currentBPM / 60) * 4; // 稍微快一点
            }

            let prevX = ecgX;
            ecgX += speed;

            // 2. 擦除“扫描头”前方的区域 (Eraser Bar)
            // 这会创造出“刷新”的效果，而不是拖影
            const eraserWidth = 60; // 擦除条宽度
            if (ecgX + eraserWidth < ecgCanvas.width) {
                ecgCtx.clearRect(ecgX, 0, eraserWidth, ecgCanvas.height);
            } else {
                // 边界情况：如果到了边缘，不仅擦除右边，也要擦除左边开头
                ecgCtx.clearRect(ecgX, 0, ecgCanvas.width - ecgX, ecgCanvas.height);
                ecgCtx.clearRect(0, 0, eraserWidth - (ecgCanvas.width - ecgX), ecgCanvas.height);
            }

            // 3. 计算 Y 轴位置
            let targetY = centerY; // 默认在中线
            
            if (isConnected && !isFlatline && waveQueue.length > 0) {
                // 如果队列里有波形数据
                let wave = waveQueue[0];
                
                // 简单的消费逻辑：每帧消耗一部分dx，直到dx耗尽进入下一个波段
                // 这里的 wave.dx 相当于持续时间
                wave.dx -= speed; 
                targetY = centerY + wave.dy; // 应用偏移

                if (wave.dx <= 0) {
                    waveQueue.shift(); // 移除已完成的波段
                }
            } else if (!isConnected || isFlatline) {
                // 噪音线
                targetY = centerY + (Math.random() - 0.5) * 2;
            }

            // 4. 绘制实线
            ecgCtx.beginPath();
            ecgCtx.lineWidth = 3;
            // 心跳过速或者直线时变红
            ecgCtx.strokeStyle = (isFlatline || currentBPM > 120) ? '#ff0000' : '#ff3366';
            ecgCtx.lineCap = 'round';
            ecgCtx.lineJoin = 'round';
            
            // 解决跨越边界时的连线问题
            if (ecgX > ecgCanvas.width) {
                ecgX = 0;
                prevX = 0;
                // 瞬移回左边，不画线
                ecgCtx.moveTo(0, targetY);
                lastEcgY = targetY;
            } else {
                ecgCtx.moveTo(prevX, lastEcgY);
                ecgCtx.lineTo(ecgX, targetY);
                ecgCtx.stroke();
                
                // 5. 绘制扫描头光点 (Glowing Tip)
                ecgCtx.fillStyle = '#fff';
                ecgCtx.shadowBlur = 10;
                ecgCtx.shadowColor = '#fff';
                ecgCtx.fillRect(ecgX, targetY - 2, 4, 4);
                ecgCtx.shadowBlur = 0; // 重置阴影以免影响线条
                
                lastEcgY = targetY;
            }
        }

        const btnAudio = document.getElementById('btn-audio');
        btnAudio.addEventListener('click', () => {
            audioEnabled = !audioEnabled;
            btnAudio.innerText = audioEnabled ? "静音" : "开启声音";
            if (!audioEnabled) stopFlatlineSound();
        });

        resizeCanvas();
        initParticles();
        animate();

    </script>
</body>
</html>

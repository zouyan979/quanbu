<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心率核心监测 // 生物反馈系统</title>
    <!-- 防止 favicon 404 报错 -->
    <link rel="icon" href="data:;base64,=">
    <style>
        :root {
            --primary-color: #ff0000; /* 修改为纯红色 */
            --bg-color: #000000;     /* 纯黑背景 */
            --text-color: #ffffff;
            --grid-color: rgba(255, 0, 0, 0.2); /* 网格也改为红色 */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace, "微软雅黑";
            overflow: hidden;
            user-select: none;
        }

        /* 画布层级管理 */
        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #ecgCanvas {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 400px;
            transform: translateY(-50%);
            z-index: 2;
        }

        /* UI 界面层 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            box-sizing: border-box;
        }

        /* 顶部信息 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .title {
            font-size: 16px;
            letter-spacing: 2px;
            opacity: 0.8;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: #ddd;
        }

        .bpm-display {
            text-align: right;
        }

        #bpm-value {
            font-size: 8rem;
            line-height: 1;
            font-weight: bold;
            color: var(--primary-color);
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
            transition: color 0.3s;
        }

        .bpm-unit {
            font-size: 1.5rem;
            opacity: 0.8;
            font-family: "微软雅黑";
        }

        /* 底部控制栏 */
        .controls {
            pointer-events: auto;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 10px 20px;
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        button:hover {
            background: var(--primary-color);
            color: #fff;
        }

        button:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 状态指示灯 */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .led {
            width: 12px;
            height: 12px;
            background-color: #333;
            border-radius: 50%;
        }

        .led.active {
            background-color: var(--primary-color);
            box-shadow: 0 0 8px var(--primary-color);
        }
        
        .led.flatline {
             background-color: #ff0000;
             box-shadow: 0 0 15px #ff0000;
             animation: blink 0.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 网格背景装饰 */
        .grid-bg {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 300px;
            transform: translateY(-50%);
            border-top: 1px solid var(--grid-color);
            border-bottom: 1px solid var(--grid-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 1;
            opacity: 0.3;
            pointer-events: none;
        }

        /* 错误提示框样式重构 - 改为居中弹窗 */
        #error-msg {
            position: absolute; /* 绝对定位，脱离文档流 */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* 居中 */
            z-index: 999; /* 确保在最上层 */
            
            color: #ff0000;
            font-size: 14px;
            display: none;
            width: 80%;
            max-width: 500px;
            background: rgba(10, 0, 0, 0.95); /* 深色背景，高不透明度 */
            padding: 30px;
            border: 1px solid #ff0000;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3); /* 强烈的红色光晕 */
            white-space: pre-wrap;
            line-height: 1.6;
            text-align: left;
            pointer-events: auto; /* 允许点击弹窗内的内容 */
        }
    </style>
</head>
<body>

    <!-- 背景粒子画布 -->
    <canvas id="particleCanvas"></canvas>
    
    <!-- 装饰网格 -->
    <div class="grid-bg"></div>

    <!-- 心电图画布 -->
    <canvas id="ecgCanvas"></canvas>

    <!-- UI 层 -->
    <div id="ui-layer">
        <div class="header">
            <div>
                <div class="title">系统状态: <span id="connection-status">等待连接</span></div>
                <div class="title">当前设备: <span id="device-name">--</span></div>
            </div>
            <div class="bpm-display">
                <span id="bpm-value">--</span>
                <span class="bpm-unit">次/分</span>
            </div>
        </div>

        <div class="controls">
            <button id="btn-connect">连接设备</button>
            <button id="btn-audio">静音</button>
            <div class="status-indicator">
                <div class="led" id="pulse-led"></div>
                <span id="status-text">无信号</span>
            </div>
        </div>
    </div>
    
    <!-- 错误提示移出 flex 容器，避免影响布局 -->
    <div id="error-msg"></div>

    <script>
        /**
         * 1. 粒子特效系统 (Particle System)
         */
        const pCanvas = document.getElementById('particleCanvas');
        const pCtx = pCanvas.getContext('2d');
        
        let particles = [];
        let pulseIntensity = 0; 

        function resizeCanvas() {
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
            ecgCanvas.width = window.innerWidth;
            ecgCanvas.height = 400; 
        }
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * pCanvas.width;
                this.y = Math.random() * pCanvas.height;
                this.size = Math.random() * 2 + 1;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.alpha = Math.random() * 0.5 + 0.1;
            }

            update(surge) {
                let speedMultiplier = 1 + (surge * 10);
                this.x += this.vx * speedMultiplier;
                this.y += this.vy * speedMultiplier;

                if (surge > 0.1) {
                    const cx = pCanvas.width / 2;
                    const cy = pCanvas.height / 2;
                    const dx = this.x - cx;
                    const dy = this.y - cy;
                    this.x += dx * 0.02 * surge;
                    this.y += dy * 0.02 * surge;
                }

                if (this.x < 0 || this.x > pCanvas.width || this.y < 0 || this.y > pCanvas.height) {
                    this.reset();
                }
            }

            draw(ctx, surge) {
                ctx.beginPath();
                const currentSize = this.size * (1 + surge * 2); 
                const currentAlpha = Math.min(this.alpha + surge, 1);
                ctx.arc(this.x, this.y, currentSize, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 50, 50, ${currentAlpha})`;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const count = (window.innerWidth * window.innerHeight) / 8000;
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        /**
         * 2. ECG 绘制系统 (改为滚动式 - Scrolling Mode)
         */
        const ecgCanvas = document.getElementById('ecgCanvas');
        const ecgCtx = ecgCanvas.getContext('2d');
        
        const centerY = 200; 
        let currentBPM = 0;
        let lastBeatTime = 0;
        let isConnected = false;
        let isFlatline = false;
        
        let waveQueue = []; 

        function generateHeartbeat() {
            // P Wave
            waveQueue.push({dx: 4, dy: -15});
            waveQueue.push({dx: 4, dy: 0});
            // PR Interval
            waveQueue.push({dx: 4, dy: 0});
            // Q Wave
            waveQueue.push({dx: 2, dy: 10});
            // R Wave
            waveQueue.push({dx: 3, dy: -120}); 
            // S Wave
            waveQueue.push({dx: 3, dy: 30});
            // ST Segment
            waveQueue.push({dx: 3, dy: 0});
            // T Wave
            waveQueue.push({dx: 6, dy: -25});
            waveQueue.push({dx: 6, dy: 0});

            // 触发特效
            pulseIntensity = 1.0; 
            playBeep();
            flashLed();
        }

        /**
         * 3. 音频系统
         */
        let audioCtx;
        let audioEnabled = true;
        let flatlineOscillator = null;

        function initAudio() {
            if (!audioCtx) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    console.error("Audio Context Init Failed:", e);
                }
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playBeep() {
            if (!audioEnabled || !audioCtx) return;
            if (isFlatline) return; 

            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.frequency.value = 600 + (currentBPM * 2); 
                osc.type = 'triangle';

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start();
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.stop(audioCtx.currentTime + 0.15);
            } catch (e) { }
        }

        function startFlatlineSound() {
            if (flatlineOscillator) return;
            if (!audioEnabled || !audioCtx) return;

            try {
                flatlineOscillator = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                flatlineOscillator.frequency.value = 400; 
                flatlineOscillator.type = 'sine';
                flatlineOscillator.connect(gain);
                gain.connect(audioCtx.destination);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                flatlineOscillator.start();
            } catch (e) { }
        }

        function stopFlatlineSound() {
            if (flatlineOscillator) {
                try { flatlineOscillator.stop(); } catch(e) {}
                flatlineOscillator = null;
            }
        }

        /**
         * 4. 蓝牙逻辑
         */
        const btnConnect = document.getElementById('btn-connect');
        const statusText = document.getElementById('status-text');
        const bpmValue = document.getElementById('bpm-value');
        const led = document.getElementById('pulse-led');
        const connectionStatus = document.getElementById('connection-status');
        const deviceNameDisplay = document.getElementById('device-name');
        const errorMsg = document.getElementById('error-msg');

        btnConnect.addEventListener('click', async () => {
            initAudio(); 
            errorMsg.style.display = 'none';
            errorMsg.innerText = "";
            stopFlatlineSound();
            isFlatline = false;

            try {
                if (!navigator.bluetooth) throw new Error("您的浏览器不支持蓝牙功能，请使用 Chrome 或 Edge。");

                connectionStatus.innerText = "正在扫描...";
                connectionStatus.style.color = "yellow";
                
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: ['heart_rate'] }],
                    optionalServices: ['heart_rate']
                });

                deviceNameDisplay.innerText = device.name;
                connectionStatus.innerText = "正在连接...";

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('heart_rate');
                const characteristic = await service.getCharacteristic('heart_rate_measurement');

                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleHeartRateChanged);
                
                device.addEventListener('gattserverdisconnected', onDisconnected);

                isConnected = true;
                connectionStatus.innerText = "已连接 / 监测中";
                connectionStatus.style.color = "#ff0000"; 
                statusText.innerText = "信号已捕获";
                btnConnect.innerText = "断开连接";
                
                lastBeatTime = Date.now();
                isFlatline = false;
                stopFlatlineSound();

                btnConnect.onclick = () => {
                   if(device.gatt.connected) device.gatt.disconnect();
                };

            } catch (error) {
                console.error(error);
                let msg = "连接错误: " + error.message;
                if (error.name === 'NetworkError') {
                    msg = "无法连接设备。\n请确保：\n1. 手表已断开与手机APP的连接\n2. 手表屏幕已点亮\n3. 刷新页面重试";
                }
                errorMsg.innerText = msg;
                errorMsg.style.display = 'block';
                connectionStatus.innerText = "连接失败";
                connectionStatus.style.color = "red";
                stopFlatlineSound();
            }
        });

        function onDisconnected() {
            isConnected = false;
            currentBPM = 0;
            bpmValue.innerText = "--"; 
            connectionStatus.innerText = "已断开连接";
            connectionStatus.style.color = "red";
            statusText.innerText = "无信号";
            btnConnect.innerText = "连接设备";
            stopFlatlineSound();
            btnConnect.onclick = () => location.reload();
        }

        function handleHeartRateChanged(event) {
            const value = event.target.value;
            const flags = value.getUint8(0);
            let bpm = 0;
            if (flags & 1) { 
                bpm = value.getUint16(1, true); 
            } else {
                bpm = value.getUint8(1);
            }

            const now = Date.now();
            currentBPM = bpm;
            bpmValue.innerText = bpm; 
            lastBeatTime = now;
            
            if (isFlatline) {
                isFlatline = false;
                stopFlatlineSound();
                statusText.innerText = "心律稳定";
                led.classList.remove('flatline');
                bpmValue.style.color = "var(--primary-color)";
            }
        }

        function flashLed() {
            led.classList.add('active');
            setTimeout(() => led.classList.remove('active'), 100);
        }

        let nextBeatTime = 0;
        let lastDrawnY = centerY; 

        /**
         * 5. 主动画循环
         */
        function animate() {
            requestAnimationFrame(animate);

            // A. 粒子背景
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            pulseIntensity *= 0.92; 
            if (pulseIntensity < 0.01) pulseIntensity = 0;
            particles.forEach(p => {
                p.update(pulseIntensity);
                p.draw(pCtx, pulseIntensity);
            });

            // B. 逻辑处理
            const now = Date.now();

            if (isConnected) {
                if (currentBPM > 0) {
                    const interval = 60000 / currentBPM;
                    if (now >= nextBeatTime) {
                        generateHeartbeat(); 
                        nextBeatTime = now + interval;
                    }
                }

                if (now - lastBeatTime > 5000) {
                    if (!isFlatline) {
                        isFlatline = true;
                        startFlatlineSound();
                        
                        statusText.innerText = "警告 / 信号丢失";
                        bpmValue.innerText = "--"; 
                        currentBPM = 0;
                        
                        led.classList.add('flatline');
                        bpmValue.style.color = "#ff0000";
                        pulseIntensity = 0;
                    }
                }
            } else {
                pulseIntensity = 0;
            }

            // C. 优化的 ECG 绘制
            let speed = 2; 
            if(isConnected && !isFlatline && currentBPM > 0) {
                speed = 2 + (currentBPM / 120); 
            }

            ecgCtx.globalCompositeOperation = 'copy';
            ecgCtx.drawImage(ecgCanvas, -speed, 0);
            ecgCtx.globalCompositeOperation = 'source-over'; 

            let targetY = centerY;
            
            if (isConnected && !isFlatline && waveQueue.length > 0) {
                let wave = waveQueue[0];
                wave.dx -= speed; 
                targetY = centerY + wave.dy; 

                if (wave.dx <= 0) {
                    waveQueue.shift(); 
                }
            } else if (!isConnected || isFlatline) {
                targetY = centerY + (Math.random() - 0.5) * 2;
            }

            ecgCtx.beginPath();
            ecgCtx.lineWidth = 2; 
            ecgCtx.strokeStyle = '#ff0000'; 
            ecgCtx.lineCap = 'round';
            ecgCtx.lineJoin = 'round';
            
            ecgCtx.moveTo(ecgCanvas.width - speed, lastDrawnY);
            ecgCtx.lineTo(ecgCanvas.width, targetY);
            ecgCtx.stroke();

            lastDrawnY = targetY;
        }

        const btnAudio = document.getElementById('btn-audio');
        btnAudio.addEventListener('click', () => {
            audioEnabled = !audioEnabled;
            btnAudio.innerText = audioEnabled ? "静音" : "开启声音";
            
            if (audioEnabled) {
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                if (isFlatline) {
                    startFlatlineSound();
                }
            } else {
                stopFlatlineSound();
            }
        });

        resizeCanvas();
        initParticles();
        animate();

    </script>
</body>
</html>

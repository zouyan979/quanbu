<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恐怖心率辅助器 (Web版)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent; /* 方便 OBS 叠加 */
            font-family: 'Courier New', Courier, monospace;
        }

        /* 基础容器 */
        #app {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* 1. 暗角层 (Vignette) - 视野变黑 */
        #vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle, transparent 30%, black 90%);
            opacity: 0; /* 动态控制 */
            transition: opacity 0.5s ease-out;
            z-index: 10;
        }

        /* 2. 噪点层 (Noise) - 信号干扰 */
        #noise-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0; /* 动态控制 */
            z-index: 11;
        }

        /* 3. 红视层 (Red Pulse) - 濒死感 */
        #red-pulse {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            box-shadow: inset 0 0 100px rgba(255, 0, 0, 0.8);
            opacity: 0; /* 动态控制 */
            z-index: 12;
            animation: pulse-anim 1s infinite;
        }

        @keyframes pulse-anim {
            0% { box-shadow: inset 0 0 50px rgba(180, 0, 0, 0.5); }
            50% { box-shadow: inset 0 0 150px rgba(255, 0, 0, 0.9); }
            100% { box-shadow: inset 0 0 50px rgba(180, 0, 0, 0.5); }
        }

        /* UI 控制面板 */
        #ui-layer {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            text-align: right;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
        }

        h1 {
            font-size: 24px;
            margin: 0;
        }

        #hr-display {
            font-size: 60px;
            font-weight: bold;
            display: block;
        }

        button {
            background: #003300;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 10px 20px;
            font-family: inherit;
            cursor: pointer;
            margin-top: 10px;
            font-size: 16px;
        }

        button:hover {
            background: #005500;
        }
        
        button:disabled {
            background: #333;
            color: #666;
            border-color: #666;
            cursor: not-allowed;
        }

        .status {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
            max-width: 300px;
            margin-left: auto; 
            white-space: pre-wrap; /* 允许错误信息换行 */
        }

        /* 演示模式开关 */
        #demo-toggle {
            font-size: 12px;
            margin-top: 15px;
            text-decoration: underline;
            cursor: pointer;
            color: #aaa;
        }
    </style>
</head>
<body>

<div id="app">
    <!-- 特效层 -->
    <div id="vignette"></div>
    <canvas id="noise-canvas"></canvas>
    <div id="red-pulse"></div>

    <!-- UI 层 -->
    <div id="ui-layer">
        <h1>生物体征监测</h1>
        <div id="hr-display">--</div>
        <div class="status" id="status-text">未连接设备</div>
        <button id="connect-btn">连接手表</button>
        <div id="demo-toggle">[切换演示模式]</div>
    </div>
</div>

<script>
(function() { // 使用立即执行函数 (IIFE) 隔离作用域，防止变量名冲突
    // --- 配置 ---
    const BASE_HR = 70;
    const PANIC_HR = 110;
    
    // --- 状态 ---
    let currentHR = 0;
    let bluetoothDevice;
    let bluetoothRemoteGATTCharacteristic;
    let isDemoMode = false;
    let demoInterval = null;

    // --- DOM 元素 ---
    const vignetteEl = document.getElementById('vignette');
    const noiseCanvas = document.getElementById('noise-canvas');
    const redPulseEl = document.getElementById('red-pulse');
    const hrDisplay = document.getElementById('hr-display');
    const statusText = document.getElementById('status-text');
    const connectBtn = document.getElementById('connect-btn');
    const demoToggleBtn = document.getElementById('demo-toggle');
    
    // --- 噪点 Canvas设置 ---
    const ctx = noiseCanvas.getContext('2d');
    let canvasW, canvasH; // 重命名变量以避免冲突
    
    const resize = () => {
        canvasW = noiseCanvas.width = window.innerWidth;
        canvasH = noiseCanvas.height = window.innerHeight;
    };
    window.addEventListener('resize', resize);
    resize();

    // 绘制噪点循环
    function loopNoise() {
        // 确保 canvasW 和 canvasH 已定义
        if (!canvasW || !canvasH) resize();

        if (parseFloat(noiseCanvas.style.opacity) > 0.01) {
            ctx.clearRect(0, 0, canvasW, canvasH);
            // 简单的随机噪点生成算法
            const idata = ctx.createImageData(canvasW, canvasH);
            const buffer32 = new Uint32Array(idata.data.buffer);
            const len = buffer32.length;
            
            // 每次只绘制一部分噪点以节省性能
            for (let i = 0; i < len; i++) {
                if (Math.random() < 0.1) { // 10% 的像素是噪点
                    // 灰/白色噪点 ABGR
                    buffer32[i] = (Math.random() * 50 + 200) | 
                                  ((Math.random() * 50 + 200) << 8) | 
                                  ((Math.random() * 50 + 200) << 16) | 
                                  (255 << 24);
                }
            }
            ctx.putImageData(idata, 0, 0);
        }
        requestAnimationFrame(loopNoise);
    }
    loopNoise();

    // --- 核心逻辑: 更新画面 ---
    function updateEffects(hr) {
        currentHR = hr;
        hrDisplay.innerText = hr;
        
        // 计算压力等级 0.0 - 1.0
        let stress = (hr - BASE_HR) / (PANIC_HR - BASE_HR);
        stress = Math.max(0, Math.min(1, stress));

        // 1. 暗角 (Vignette)
        // 从 stress 0.1 开始显示，最黑达到 95% 不透明度
        let vigOp = 0;
        if (stress > 0.1) {
            vigOp = Math.min(0.95, stress * 1.2); 
        }
        vignetteEl.style.opacity = vigOp;
        // 动态调整暗角的半径
        let percentage = 90 - (stress * 60); // 90% -> 30%
        vignetteEl.style.background = `radial-gradient(circle, transparent ${percentage/3}%, black ${percentage}%)`;

        // 2. 噪点 (Noise)
        // 只有极度恐惧 (>0.7) 才会出现
        let noiseOp = 0;
        if (stress > 0.7) {
            noiseOp = (stress - 0.7) * 2.0; // 0.0 -> 0.6
        }
        noiseCanvas.style.opacity = noiseOp;

        // 3. 红视 (Red Pulse)
        // 只有濒死 (>0.9) 才会出现
        let redOp = 0;
        if (stress > 0.9) {
            redOp = 1;
        }
        redPulseEl.style.opacity = redOp;
        
        // 字体缩放动画
        if (stress > 0.5) {
            let scale = 1 + (stress - 0.5) * 0.5;
            hrDisplay.style.transform = `scale(${scale})`;
            hrDisplay.style.color = stress > 0.8 ? '#f00' : '#0f0';
            hrDisplay.style.textShadow = stress > 0.8 ? '0 0 10px #f00' : '0 0 5px #0f0';
        } else {
            hrDisplay.style.transform = `scale(1)`;
            hrDisplay.style.color = '#0f0';
            hrDisplay.style.textShadow = '0 0 5px #0f0';
        }
    }

    // --- Web Bluetooth 连接 ---
    async function connectBluetooth() {
        try {
            statusText.innerText = "正在请求蓝牙设备...";
            statusText.style.color = "#0f0";
            
            // 1. 扫描设备 (必须由用户手势触发)
            bluetoothDevice = await navigator.bluetooth.requestDevice({
                filters: [{ services: ['heart_rate'] }],
                optionalServices: ['heart_rate']
            });

            statusText.innerText = "正在连接 GATT 服务...";
            const server = await bluetoothDevice.gatt.connect();

            statusText.innerText = "正在获取服务...";
            const service = await server.getPrimaryService('heart_rate');

            statusText.innerText = "正在获取特征值...";
            bluetoothRemoteGATTCharacteristic = await service.getCharacteristic('heart_rate_measurement');

            statusText.innerText = "正在开启通知...";
            await bluetoothRemoteGATTCharacteristic.startNotifications();

            bluetoothRemoteGATTCharacteristic.addEventListener('characteristicvaluechanged', handleCharacteristicValueChanged);
            
            statusText.innerText = "已连接: " + bluetoothDevice.name;
            connectBtn.disabled = true;
            connectBtn.innerText = "已连接";
            
            // 监听断开
            bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);

        } catch (error) {
            console.error(error);
            // 专门处理 SecurityError
            if (error.name === 'SecurityError' && error.message.includes('permissions policy')) {
                statusText.innerText = "环境限制：Web Bluetooth 在此预览窗口中被禁用。\n请下载 .html 文件并在本地浏览器运行。";
                statusText.style.color = "yellow";
                alert("浏览器安全限制提示：\n\n当前的预览环境（IFrame）不支持蓝牙连接。\n\n请将此代码保存为 .html 文件，直接在 Chrome/Edge 浏览器中打开即可正常连接手表。\n\n现在您可以点击 [切换演示模式] 来测试恐怖特效。");
            } else if (error.name === 'NotFoundError') {
                statusText.innerText = "已取消 / 未找到设备";
            } else {
                statusText.innerText = "错误: " + error.message;
            }
        }
    }

    function handleCharacteristicValueChanged(event) {
        const value = event.target.value;
        // 解析标准 BLE 心率数据
        const flags = value.getUint8(0);
        let hr;
        
        if ((flags & 0x01) === 1) {
            hr = value.getUint16(1, true); 
        } else {
            hr = value.getUint8(1);
        }
        
        updateEffects(hr);
    }

    function onDisconnected(event) {
        const device = event.target;
        statusText.innerText = "已断开连接";
        connectBtn.disabled = false;
        connectBtn.innerText = "连接手表";
        updateEffects(0);
    }

    // --- 演示模式 ---
    function toggleDemo() {
        if (isDemoMode) {
            clearInterval(demoInterval);
            isDemoMode = false;
            statusText.innerText = "演示已停止";
            updateEffects(0);
        } else {
            isDemoMode = true;
            statusText.innerText = "演示模式运行中...";
            let simHR = 60;
            let dir = 1;
            demoInterval = setInterval(() => {
                simHR += dir;
                if (simHR > 120) dir = -1;
                if (simHR < 60) dir = 1;
                updateEffects(simHR);
            }, 100);
        }
    }

    // --- 事件绑定 ---
    // 移除 HTML 中的 onclick，统一使用 addEventListener
    connectBtn.addEventListener('click', connectBluetooth);
    if (demoToggleBtn) {
        demoToggleBtn.addEventListener('click', toggleDemo);
    }

})();
</script>
</body>
</html>

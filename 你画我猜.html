<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P 你画我猜 (离线版)</title>
    
    <!-- 1. 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 2. 引入 Babel (用于解析 JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 3. 引入 Tailwind CSS (样式) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 4. 引入 PeerJS (P2P 联机核心) -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        body { touch-action: none; } /* 防止手机画画时滚动页面 */
        .no-select { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="bg-gray-100 h-screen w-screen overflow-hidden">
    <div id="root" class="h-full w-full"></div>

    <!-- 游戏逻辑 -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 配置 ---
        const ICE_SERVERS = [
            { urls: 'stun:stun.qq.com:3478' },
            { urls: 'stun:stun.miwifi.com:3478' },
            { urls: 'stun:stun.l.google.com:19302' }
        ];
        const PEER_ID_PREFIX = 'dg-game-v1-';
        const WORDS = ["熊猫", "火锅", "奶茶", "高铁", "手机", "电脑", "孙悟空", "月饼", "长城", "饺子", "足球", "外卖"];
        const COLORS = ['#000000', '#ef4444', '#f59e0b', '#22c55e', '#3b82f6', '#a855f7', '#ffffff'];
        const LINE_WIDTHS = [2, 5, 10];

        // 初始状态
        const INITIAL_STATE = {
            status: 'LOBBY',
            players: [],
            currentDrawerIndex: 0,
            currentWord: '',
            messages: [],
            lines: [],
            version: 0
        };

        function App() {
            // 基础状态
            const [view, setView] = useState('LOGIN');
            const [user, setUser] = useState(null);
            const [username, setUsername] = useState('');
            const [roomId, setRoomId] = useState('');
            
            // P2P 状态
            const [peer, setPeer] = useState(null);
            const [connections, setConnections] = useState([]); 
            const [hostConn, setHostConn] = useState(null);
            const [isConnected, setIsConnected] = useState(false);
            const [connectError, setConnectError] = useState('');

            // 游戏数据
            const [gameState, setGameState] = useState(INITIAL_STATE);
            
            // 本地交互
            const [currentLine, setCurrentLine] = useState(null);
            const [selectedColor, setSelectedColor] = useState('#000000');
            const [selectedWidth, setSelectedWidth] = useState(5);
            const [inputGuess, setInputGuess] = useState('');

            const canvasRef = useRef(null);
            const chatEndRef = useRef(null);
            const gameStateRef = useRef(INITIAL_STATE);

            // 同步 Ref
            useEffect(() => {
                gameStateRef.current = gameState;
            }, [gameState]);

            // --- P2P 初始化 ---
            const initPeer = (customId) => {
                const newPeer = new Peer(customId, {
                    config: { iceServers: ICE_SERVERS },
                    debug: 1
                });

                newPeer.on('open', (id) => {
                    console.log('My Peer ID:', id);
                    setIsConnected(true);
                    setConnectError('');
                });

                newPeer.on('error', (err) => {
                    console.error('Peer Error:', err);
                    setIsConnected(false);
                    if (err.type === 'unavailable-id') {
                        setConnectError('房间号已被占用');
                        setView('LOBBY');
                    } else if (err.type === 'peer-unavailable') {
                        setConnectError('找不到房间(房主可能离线)');
                        setView('LOBBY');
                    } else {
                        setConnectError('连接错误: ' + err.type);
                    }
                });
                return newPeer;
            };

            // --- 房主逻辑 ---
            const createRoom = () => {
                if (!username || !roomId) return;
                const fullRoomId = PEER_ID_PREFIX + roomId;
                
                const newPeer = initPeer(fullRoomId);
                setPeer(newPeer);

                const me = { uid: fullRoomId, name: username, score: 0, isHost: true };
                setUser(me);
                
                const initialState = {
                    ...INITIAL_STATE,
                    players: [me],
                    messages: [{ sender: '系统', text: `房间 ${roomId} 创建成功！`, type: 'system' }]
                };
                setGameState(initialState);

                newPeer.on('connection', (conn) => {
                    conn.on('open', () => {
                        setConnections(prev => [...prev, conn]);
                        conn.send({ type: 'STATE_SYNC', state: gameStateRef.current });
                    });

                    conn.on('data', (data) => handleHostReceiveData(data, conn));

                    conn.on('close', () => {
                        setConnections(prev => prev.filter(c => c.peer !== conn.peer));
                        const newState = {
                           ...gameStateRef.current,
                           players: gameStateRef.current.players.filter(p => !p.uid.includes(conn.peer))
                        };
                        updateAndBroadcastState(newState);
                    });
                });

                setView('GAME');
            };

            const handleHostReceiveData = (data, senderConn) => {
                const currentState = gameStateRef.current;

                if (data.type === 'PLAYER_JOIN') {
                    const newPlayer = { ...data.player, uid: senderConn.peer, isHost: false };
                    // 检查重名或重复
                    if (currentState.players.find(p => p.uid === newPlayer.uid)) return;

                    const newState = {
                        ...currentState,
                        players: [...currentState.players, newPlayer],
                        messages: [...currentState.messages, { sender: '系统', text: `${newPlayer.name} 加入了游戏`, type: 'system' }]
                    };
                    updateAndBroadcastState(newState);
                } 
                else if (data.type === 'DRAW_LINE') {
                    const newState = {
                        ...currentState,
                        lines: [...currentState.lines, data.line]
                    };
                    setGameState(newState); 
                    broadcast({ type: 'DRAW_ACTION', line: data.line, sender: senderConn.peer });
                }
                else if (data.type === 'CHAT_MESSAGE') {
                    const msg = data.message;
                    const isDrawing = currentState.status === 'DRAWING';
                    const isCorrect = isDrawing && msg.trim() === currentState.currentWord;

                    if (isCorrect) {
                        const drawerId = currentState.players[currentState.currentDrawerIndex].uid;
                        const guesserId = senderConn.peer;

                        const updatedPlayers = currentState.players.map(p => {
                            if (p.uid === guesserId) return { ...p, score: p.score + 10 };
                            if (p.uid === drawerId) return { ...p, score: p.score + 5 };
                            return p;
                        });

                        const nextIndex = (currentState.currentDrawerIndex + 1) % currentState.players.length;
                        const newState = {
                            ...currentState,
                            players: updatedPlayers,
                            status: 'SELECTING',
                            currentDrawerIndex: nextIndex,
                            lines: [],
                            messages: [...currentState.messages, { sender: '系统', text: `${data.senderName} 猜对了！答案是 ${currentState.currentWord}`, type: 'correct' }]
                        };
                        updateAndBroadcastState(newState);
                    } else {
                        const newState = {
                            ...currentState,
                            messages: [...currentState.messages, { sender: data.senderName, text: msg, type: 'chat' }]
                        };
                        updateAndBroadcastState(newState);
                    }
                }
            };

            const broadcast = (payload) => {
                connections.forEach(conn => {
                    if (conn.open) conn.send(payload);
                });
            };

            const updateAndBroadcastState = (newState) => {
                setGameState(newState);
                broadcast({ type: 'STATE_SYNC', state: newState });
            };

            // --- 玩家逻辑 ---
            const joinRoom = () => {
                if (!username || !roomId) return;
                
                const newPeer = initPeer();
                setPeer(newPeer);

                const me = { uid: 'temp', name: username, score: 0, isHost: false };
                setUser(me);

                const hostId = PEER_ID_PREFIX + roomId;
                const conn = newPeer.connect(hostId);
                
                conn.on('open', () => {
                    setHostConn(conn);
                    setIsConnected(true);
                    conn.send({ type: 'PLAYER_JOIN', player: me });
                });

                conn.on('data', (data) => {
                    if (data.type === 'STATE_SYNC') {
                        setGameState(data.state);
                    } else if (data.type === 'DRAW_ACTION') {
                        setGameState(prev => ({ ...prev, lines: [...prev.lines, data.line] }));
                    }
                });

                conn.on('close', () => {
                    alert("与房主断开连接");
                    setView('LOBBY');
                });

                conn.on('error', (err) => {
                    console.error(err);
                    setConnectError("连接失败");
                });

                setView('GAME');
            };

            const guestSendDraw = (line) => {
                if (hostConn && hostConn.open) hostConn.send({ type: 'DRAW_LINE', line });
            };

            const guestSendMessage = (text) => {
                if (hostConn && hostConn.open) hostConn.send({ type: 'CHAT_MESSAGE', message: text, senderName: username });
            };

            // --- 房主操作 ---
            const hostStartGame = () => {
                const newState = {
                    ...gameStateRef.current,
                    status: 'SELECTING',
                    currentDrawerIndex: 0,
                    lines: [],
                    messages: [...gameStateRef.current.messages, { sender: '系统', text: '游戏开始！', type: 'system' }]
                };
                updateAndBroadcastState(newState);
            };

            const hostSelectWord = (word) => {
                const newState = {
                    ...gameStateRef.current,
                    status: 'DRAWING',
                    currentWord: word,
                    lines: [],
                    messages: [...gameStateRef.current.messages, { sender: '系统', text: '画手已选题，请作画！', type: 'system' }]
                };
                updateAndBroadcastState(newState);
            };

            const hostClearCanvas = () => {
                const newState = { ...gameStateRef.current, lines: [] };
                updateAndBroadcastState(newState);
            };

            // --- 通用交互 ---
            const handleInputSubmit = () => {
                if (!inputGuess.trim()) return;
                if (user?.isHost) {
                    handleHostReceiveData(
                        { type: 'CHAT_MESSAGE', message: inputGuess, senderName: user.name }, 
                        { peer: user.uid }
                    );
                } else {
                    guestSendMessage(inputGuess);
                }
                setInputGuess('');
            };

            // --- 绘图 ---
            const getPos = (e) => {
                const r = canvasRef.current.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
                return { x, y };
            };

            const startDraw = (e) => {
                if (gameState.status !== 'DRAWING') return;
                const myId = user?.isHost ? user.uid : peer?.id;
                // 简单校验：只要不是自己回合就不画
                const currentDrawer = gameState.players[gameState.currentDrawerIndex];
                // P2P ID 有时候会有前缀差异，这里简化判断：如果是房主，判断uid；如果是玩家，只负责画，由房主校验
                // 为了演示流畅，不做严格校验
                
                const {x, y} = getPos(e);
                setCurrentLine({ points: [{x, y}], color: selectedColor, width: selectedWidth });
            };

            const moveDraw = (e) => {
                if (!currentLine) return;
                const {x, y} = getPos(e);
                setCurrentLine(prev => prev ? { ...prev, points: [...prev.points, {x, y}] } : null);
            };

            const endDraw = () => {
                if (!currentLine) return;
                if (user?.isHost) {
                    const newState = { ...gameStateRef.current, lines: [...gameStateRef.current.lines, currentLine] };
                    updateAndBroadcastState(newState);
                } else {
                    guestSendDraw(currentLine);
                }
                setCurrentLine(null);
            };

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                if (!ctx) return;

                const parent = canvas.parentElement;
                if (parent) {
                    canvas.width = parent.clientWidth;
                    canvas.height = parent.clientWidth;
                }

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                gameState.lines.forEach(l => {
                    ctx.beginPath();
                    ctx.strokeStyle = l.color;
                    ctx.lineWidth = l.width;
                    ctx.moveTo(l.points[0].x, l.points[0].y);
                    for(let i=1; i<l.points.length; i++) ctx.lineTo(l.points[i].x, l.points[i].y);
                    ctx.stroke();
                });

                if (currentLine) {
                    ctx.beginPath();
                    ctx.strokeStyle = currentLine.color;
                    ctx.lineWidth = currentLine.width;
                    ctx.moveTo(currentLine.points[0].x, currentLine.points[0].y);
                    for(let i=1; i<currentLine.points.length; i++) ctx.lineTo(currentLine.points[i].x, currentLine.points[i].y);
                    ctx.stroke();
                }
            }, [gameState.lines, currentLine, view]);

            useEffect(() => {
                if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
            }, [gameState.messages]);


            // --- 渲染 ---
            if (view === 'LOGIN') {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen p-4 bg-indigo-50">
                        <div className="w-full max-w-sm p-8 bg-white border-4 border-indigo-400 shadow-xl rounded-2xl">
                            <h1 className="flex items-center justify-center gap-2 mb-6 text-3xl font-bold text-center text-indigo-600">
                                🎨 你画我猜 <span className="px-2 text-xs bg-indigo-100 rounded">HTML版</span>
                            </h1>
                            <div className="space-y-4">
                                <input type="text" value={username} onChange={e => setUsername(e.target.value)} className="w-full p-3 text-lg border-2 rounded-xl" placeholder="请输入昵称" maxLength={8} />
                                <button onClick={() => username && setView('LOBBY')} className="w-full py-3 font-bold text-white transition-colors bg-indigo-500 shadow rounded-xl active:scale-95">进入大厅</button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'LOBBY') {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen p-4 bg-blue-50">
                        <div className="w-full max-w-sm p-8 bg-white border-4 border-blue-400 shadow-xl rounded-2xl">
                            <h2 className="mb-2 text-2xl font-bold text-gray-800">游戏大厅</h2>
                            {connectError && <div className="flex items-center gap-1 p-2 mb-4 text-xs text-red-600 bg-red-100 rounded">⚠️ {connectError}</div>}
                            
                            <div className="space-y-4">
                                <div className="p-4 border border-blue-100 bg-blue-50 rounded-xl">
                                    <h3 className="flex items-center gap-2 mb-2 font-bold text-blue-800">🏠 我当房主</h3>
                                    <div className="flex gap-2">
                                        <input type="number" value={roomId} onChange={e => setRoomId(e.target.value)} placeholder="房间号 (如 666)" className="flex-1 p-2 border rounded" />
                                        <button onClick={createRoom} className="px-4 text-sm font-bold text-white bg-blue-600 rounded">创建</button>
                                    </div>
                                </div>

                                <div className="p-4 border border-green-100 bg-green-50 rounded-xl">
                                    <h3 className="flex items-center gap-2 mb-2 font-bold text-green-800">📱 我是玩家</h3>
                                    <div className="flex gap-2">
                                        <input type="number" value={roomId} onChange={e => setRoomId(e.target.value)} placeholder="输入房间号" className="flex-1 p-2 border rounded" />
                                        <button onClick={joinRoom} className="px-4 text-sm font-bold text-white bg-green-600 rounded">加入</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // Game View
            const isDrawer = gameState.players[gameState.currentDrawerIndex]?.uid === (user?.isHost ? user.uid : peer?.id); // 简化判断

            return (
                <div className="flex flex-col h-full max-w-md mx-auto bg-gray-100 shadow-2xl">
                    <header className="flex items-center justify-between p-2 bg-white shadow shrink-0">
                        <div className="flex flex-col"><span className="text-xs text-gray-500">房间号</span><b className="text-blue-600">{roomId}</b></div>
                        <div className="flex items-center gap-2">
                            <span className={`flex items-center text-xs ${isConnected?'text-green-500':'text-red-500'}`}>
                                {isConnected ? '🟢' : '🔴'} {user?.isHost ? '房主' : '玩家'}
                            </span>
                            <button onClick={() => window.location.reload()} className="text-sm text-red-500">退出</button>
                        </div>
                    </header>

                    <div className="relative flex flex-col flex-1 overflow-hidden">
                        <div className="p-2 text-sm font-bold text-center text-yellow-800 bg-yellow-100">
                            {gameState.status === 'LOBBY' && `等待玩家... (${gameState.players.length}人)`}
                            {gameState.status === 'SELECTING' && '选词环节...'}
                            {gameState.status === 'DRAWING' && `回合进行中`}
                        </div>

                        {/* Lobby Overlay */}
                        {gameState.status === 'LOBBY' && (
                            <div className="absolute inset-0 z-20 flex flex-col p-6 bg-white/95">
                                <div className="flex-1 space-y-2 overflow-auto">
                                    {gameState.players.map((p, i) => (
                                        <div key={i} className="flex items-center justify-between p-2 bg-white border rounded">
                                            <span className="font-bold">{p.name}</span>
                                            {p.isHost && <span className="px-2 text-xs bg-yellow-200 rounded">房主</span>}
                                        </div>
                                    ))}
                                </div>
                                {user?.isHost ? 
                                    <button onClick={hostStartGame} className="w-full py-3 mt-4 font-bold text-white bg-green-500 rounded-xl animate-pulse">▶️ 开始游戏</button> :
                                    <p className="mt-4 text-center text-gray-500 animate-pulse">等待房主开始...</p>
                                }
                            </div>
                        )}

                        {/* Selecting Overlay */}
                        {gameState.status === 'SELECTING' && isDrawer && (
                            <div className="absolute inset-0 z-20 flex flex-col justify-center p-6 bg-black/80">
                                <h3 className="mb-4 text-xl font-bold text-center text-white">选择一个词语</h3>
                                <div className="grid grid-cols-2 gap-4">
                                    {[WORDS[Math.floor(Math.random()*WORDS.length)], WORDS[Math.floor(Math.random()*WORDS.length)]].map((w, i) => (
                                        <button key={i} onClick={() => user?.isHost ? hostSelectWord(w) : null} className="py-4 text-xl font-bold bg-white rounded hover:bg-gray-200">{w}</button>
                                    ))}
                                </div>
                            </div>
                        )}

                        <div className="relative w-full bg-white aspect-square shrink-0">
                            <canvas ref={canvasRef} className="w-full h-full cursor-crosshair touch-none"
                                onMouseDown={startDraw} onMouseMove={moveDraw} onMouseUp={endDraw} onMouseLeave={endDraw}
                                onTouchStart={startDraw} onTouchMove={moveDraw} onTouchEnd={endDraw}
                            />
                        </div>

                        {/* Toolbar */}
                        {isDrawer && gameState.status === 'DRAWING' && (
                            <div className="flex gap-2 p-2 overflow-x-auto bg-gray-100 border-b shrink-0">
                                {COLORS.map(c => <button key={c} onClick={() => setSelectedColor(c)} className={`w-6 h-6 rounded-full border-2 ${selectedColor===c?'border-black':'border-transparent'}`} style={{backgroundColor: c}}></button>)}
                                <div className="w-px mx-1 bg-gray-300"></div>
                                <button onClick={() => setSelectedColor('#ffffff')} className="p-1 bg-white border rounded">🧹</button>
                                {user?.isHost && <button onClick={hostClearCanvas} className="p-1 text-red-500 bg-red-100 border rounded">🗑️</button>}
                            </div>
                        )}

                        {/* Chat */}
                        <div className="flex-1 min-h-0 p-2 space-y-1 overflow-y-auto bg-gray-50">
                            {gameState.messages.map((m, i) => (
                                <div key={i} className={`text-sm ${m.type==='system'?'text-center text-gray-400 text-xs':m.type==='correct'?'text-center text-green-600 font-bold':''}`}>
                                    {m.type==='chat' && <span className="font-bold text-gray-700">{m.sender}: </span>}
                                    {m.text}
                                </div>
                            ))}
                            <div ref={chatEndRef}/>
                        </div>

                        {/* Input */}
                        {!isDrawer && gameState.status === 'DRAWING' && (
                            <div className="flex gap-2 p-2 bg-white border-t shrink-0">
                                <input value={inputGuess} onChange={e => setInputGuess(e.target.value)} onKeyDown={e => e.key==='Enter'&&handleInputSubmit()} className="flex-1 px-3 border rounded-full" placeholder="输入答案..." />
                                <button onClick={handleInputSubmit} className="p-2 text-white bg-blue-500 rounded-full">📤</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
